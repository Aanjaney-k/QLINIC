<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Token Overview – QLINIC</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;700&family=JetBrains+Mono:wght@500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            overflow-x: hidden;
        }

        .mesh-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            overflow: hidden;
        }

        .mesh-bg::before {
            content: '';
            position: absolute;
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, rgba(14, 164, 113, .08) 0%, transparent 65%);
            border-radius: 50%;
            top: -180px;
            right: -180px;
            animation: meshDrift1 12s ease-in-out infinite alternate;
        }

        .mesh-bg::after {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(99, 102, 241, .05) 0%, transparent 65%);
            border-radius: 50%;
            bottom: -120px;
            left: -120px;
            animation: meshDrift2 10s ease-in-out infinite alternate;
        }

        @keyframes meshDrift1 {
            0% {
                transform: translate(0, 0) scale(1)
            }

            100% {
                transform: translate(-50px, 70px) scale(1.12)
            }
        }

        @keyframes meshDrift2 {
            0% {
                transform: translate(0, 0) scale(1)
            }

            100% {
                transform: translate(70px, -50px) scale(1.15)
            }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0
            }

            to {
                opacity: 1
            }
        }

        @keyframes loaderGrow {
            from {
                width: 0
            }

            to {
                width: 100%
            }
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0)
            }

            50% {
                transform: translateY(-5px)
            }
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: .35
            }
        }

        @keyframes tokenPop {
            0% {
                transform: scale(1);
            }

            40% {
                transform: scale(1.18);
            }

            70% {
                transform: scale(.94);
            }

            100% {
                transform: scale(1);
            }
        }

        /* Loader */
        .page-loader {
            position: fixed;
            inset: 0;
            background: #fff;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 18px;
            transition: opacity .5s ease, visibility .5s ease;
        }

        .page-loader.gone {
            opacity: 0;
            visibility: hidden;
        }

        .loader-brand {
            font-family: 'Syne', sans-serif;
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--primary);
        }

        .loader-bar {
            width: 180px;
            height: 3px;
            background: var(--primary-lt, #d1fae5);
            border-radius: 3px;
            overflow: hidden;
        }

        .loader-fill {
            height: 100%;
            background: var(--primary);
            border-radius: 3px;
            animation: loaderGrow 1.1s ease forwards;
        }

        /* Topbar */
        .topbar {
            backdrop-filter: blur(20px) !important;
            background: rgba(255, 255, 255, .88) !important;
            animation: fadeIn .4s ease;
        }

        .topbar-brand {
            font-family: 'Syne', sans-serif !important;
            font-weight: 800 !important;
        }

        .topbar-brand .q {
            display: inline-block;
            animation: bounce 2.5s ease-in-out infinite;
            color: var(--primary);
        }

        .topbar-nav a {
            border-radius: 8px;
            transition: color .2s, background .2s !important;
        }

        .topbar-nav a:hover {
            color: var(--primary) !important;
            background: var(--primary-lt) !important;
        }

        /* Live badge */
        .live-pill {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 100px;
            padding: 6px 14px;
            font-size: .8rem;
            font-weight: 600;
            box-shadow: 0 3px 10px rgba(0, 0, 0, .06);
        }

        .live-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #10b981;
            box-shadow: 0 0 8px #10b981;
            animation: blink 1.5s infinite;
        }

        /* Hospital filter tabs */
        .hosp-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 24px;
            animation: fadeUp .4s ease both;
        }

        .hosp-tab {
            padding: 6px 16px;
            border-radius: 100px;
            border: 1.5px solid var(--border);
            font-size: .82rem;
            font-weight: 600;
            cursor: pointer;
            background: var(--surface);
            color: var(--text-muted);
            transition: all .2s ease;
        }

        .hosp-tab:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .hosp-tab.active {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff;
            box-shadow: 0 3px 10px rgba(14, 164, 113, .25);
        }

        /* Doctor cards grid */
        .doctors-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 20px;
            width: 100%;
        }

        /* Doctor token card */
        .doc-card {
            background: #fff;
            border-radius: 20px;
            border: 1.5px solid var(--border);
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0, 0, 0, .05);
            animation: fadeUp .45s ease both;
            transition: box-shadow .25s ease, transform .25s ease;
            width: 100%;
        }

        .doc-card:hover {
            box-shadow: 0 10px 30px rgba(0, 0, 0, .1);
            transform: translateY(-3px);
        }

        /* Card header */
        .doc-card-head {
            padding: 18px 20px 14px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 13px;
        }

        .doc-avatar {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary) 0%, #059669 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            font-weight: 800;
            color: #fff;
            flex-shrink: 0;
            font-family: 'Syne', sans-serif;
        }

        .doc-info {
            flex: 1;
            min-width: 0;
        }

        .doc-name {
            font-weight: 700;
            font-size: .95rem;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .doc-spec {
            font-size: .76rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .doc-status-pill {
            font-size: .7rem;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 100px;
            white-space: nowrap;
        }

        .pill-active {
            background: #d1fae5;
            color: #065f46;
        }

        .pill-busy {
            background: #fef3c7;
            color: #92400e;
        }

        .pill-idle {
            background: var(--surface-2);
            color: var(--text-muted);
        }

        /* Token body */
        .doc-card-body {
            padding: 18px 20px;
        }

        .token-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 16px;
        }

        .token-box {
            text-align: center;
            padding: 12px 6px;
            border-radius: 12px;
            background: var(--surface);
            border: 1.5px solid var(--border);
        }

        .token-box.now {
            background: linear-gradient(135deg, var(--primary) 0%, #059669 100%);
            border-color: var(--primary);
        }

        .token-box.next {
            background: #fff7ed;
            border-color: #fed7aa;
        }

        .token-box.prev {
            background: #f1f5f9;
            border-color: #e2e8f0;
        }

        .tb-label {
            font-size: .65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .07em;
            margin-bottom: 4px;
            color: var(--text-muted);
        }

        .token-box.now .tb-label {
            color: rgba(255, 255, 255, .8);
        }

        .tb-num {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.55rem;
            font-weight: 700;
            line-height: 1;
            color: var(--text);
        }

        .token-box.now .tb-num {
            color: #fff;
            font-size: 1.8rem;
        }

        .token-box.next .tb-num {
            color: #ea580c;
        }

        .tb-num.pop {
            animation: tokenPop .4s ease;
        }

        /* Queue strip */
        .queue-strip {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .queue-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--surface);
            border-radius: 10px;
            padding: 8px 12px;
            font-size: .82rem;
            border: 1px solid var(--border);
        }

        .qi-token {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            color: var(--primary);
            font-size: .85rem;
            min-width: 34px;
        }

        .qi-name {
            flex: 1;
            font-weight: 500;
            color: var(--text);
        }

        .qi-time {
            color: var(--text-muted);
            font-size: .75rem;
        }

        .qi-you {
            font-size: .68rem;
            font-weight: 700;
            background: var(--primary);
            color: #fff;
            padding: 2px 7px;
            border-radius: 100px;
        }

        .queue-empty {
            text-align: center;
            padding: 18px;
            color: var(--text-muted);
            font-size: .82rem;
        }

        /* Card footer */
        .doc-card-foot {
            padding: 12px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--surface);
        }

        .foot-stat {
            font-size: .76rem;
            color: var(--text-muted);
        }

        .foot-stat strong {
            color: var(--text);
            font-weight: 700;
        }

        .foot-wait {
            font-size: .76rem;
            font-weight: 600;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* Your token highlight */
        .your-token-banner {
            background: linear-gradient(90deg, rgba(14, 164, 113, .12) 0%, rgba(14, 164, 113, .04) 100%);
            border: 1.5px solid rgba(14, 164, 113, .3);
            border-radius: 10px;
            padding: 10px 14px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: .82rem;
            animation: fadeUp .3s ease both;
        }

        .ytb-icon {
            font-size: 1.1rem;
        }

        .ytb-text {
            flex: 1;
            color: var(--text);
        }

        .ytb-text strong {
            color: var(--primary);
        }

        .ytb-pos {
            font-size: .76rem;
            font-weight: 700;
            background: var(--primary);
            color: #fff;
            padding: 3px 9px;
            border-radius: 100px;
        }

        /* No appointments */
        .no-appts {
            display: none;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state .es-icon {
            font-size: 3rem;
            margin-bottom: 12px;
        }

        .empty-state .es-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 6px;
        }

        .empty-state .es-sub {
            font-size: .85rem;
        }

        /* Responsive */
        @media(max-width:768px) {
            .doctors-grid {
                grid-template-columns: 1fr;
            }

            .topbar-brand span:last-child {
                display: none;
            }

            .page-header {
                flex-direction: column !important;
                align-items: flex-start !important;
                gap: 10px;
            }
        }

        @media(max-width:480px) {
            .token-row {
                grid-template-columns: 1fr 1fr 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="mesh-bg"></div>
    <div class="page-loader" id="loader">
        <div class="loader-brand">Q<span style="color:var(--accent,#f59e0b)">.</span>LINIC</div>
        <div class="loader-bar">
            <div class="loader-fill"></div>
        </div>
    </div>

    <header class="topbar">
        <div class="topbar-brand"><span class="q">Q</span><span class="dot">.</span>LINIC
            <span
                style="font-size:.72rem;font-weight:500;color:var(--text-soft);margin-left:8px;background:var(--surface-2);padding:2px 8px;border-radius:4px;">Patient</span>
        </div>
        <button class="menu-toggle" id="menuToggle" style="margin-left:auto;">☰</button>
        <nav class="topbar-nav" id="topbarNav">
            <a href="patient_dashboard.html">Dashboard</a>
            <a href="patient_token_view.html" class="active">Token View</a>
            <a href="patient_view_doctors.html">Doctors</a>
            <a href="patient_book_appointment.html">Book</a>
            <a href="patient_my_appointments.html">Appointments</a>
            <a href="patient_profile.html">Profile</a>
            <a href="#" onclick="Auth.logout()" class="btn btn-outline btn-sm" style="margin-left:8px;">Logout</a>
        </nav>
    </header>

    <div class="page-wrap">
        <div class="page-header"
            style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;">
            <div>
                <h1 style="font-family:'Syne',sans-serif;font-weight:800;margin:0;animation:fadeUp .5s ease both;">Token
                    Overview</h1>
                <p class="text-muted" style="margin-top:4px;animation:fadeUp .5s .08s ease both;">Your appointment queue
                    status</p>
            </div>
            <div class="live-pill">
                <span class="live-dot"></span>
                <span id="clockDisplay">--:--:--</span>
            </div>
        </div>

        <!-- Hospital filter tabs (hidden - only booked doctor shown) -->
        <div class="hosp-tabs" id="hospTabs" style="display:none;"></div>

        <!-- Doctor cards -->
        <div class="doctors-grid" id="doctorsGrid"></div>

        <!-- Empty state -->
        <div class="empty-state" id="emptyState" style="display:none;">
            <div class="es-icon">🏥</div>
            <div class="es-title">No active bookings</div>
            <div class="es-sub">You don't have any pending or confirmed appointments. <a
                    href="patient_book_appointment.html">Book one →</a></div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        window.addEventListener('load', () => setTimeout(() => document.getElementById('loader').classList.add('gone'), 1100));

        const session = Auth.requireRole('patient', 'patient_login.html');

        // Menu toggle
        const menuToggle = document.getElementById('menuToggle');
        const topbarNav = document.getElementById('topbarNav');
        if (menuToggle && topbarNav) {
            menuToggle.addEventListener('click', () => {
                topbarNav.classList.toggle('open');
                menuToggle.textContent = topbarNav.classList.contains('open') ? '✕' : '☰';
            });
        }

        // Clock
        function updateClock() {
            document.getElementById('clockDisplay').textContent =
                new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        // ── State ──
        let activeHospId = null;
        const hospitals = SuperDB.getHospitals().filter(h => h.status === 'active');

        // Build hospital tabs
        function renderHospTabs() {
            const tabs = document.getElementById('hospTabs');
            if (hospitals.length <= 1) {
                tabs.style.display = 'none';
                return;
            }
            const all = [{ id: '__all', name: 'All Hospitals' }, ...hospitals];
            tabs.innerHTML = all.map(h =>
                `<div class="hosp-tab ${activeHospId === h.id ? 'active' : ''}"
              onclick="setHospFilter('${h.id}')">${h.name}</div>`
            ).join('');
        }

        function setHospFilter(hid) {
            activeHospId = (hid === '__all') ? null : hid;
            renderHospTabs();
            renderCards();
        }

        // Get initials for avatar
        function initials(name) {
            return name.split(' ').filter(Boolean).slice(0, 2).map(w => w[0]).join('').toUpperCase();
        }

        // ── Main render ──
        function renderCards() {
            const allAppts = DB.getAppointments();
            const myAppts = allAppts.filter(a => a.patientId === session.id);

            // Only show doctors the patient has an active booking with
            const myActiveAppts = myAppts.filter(a => a.status === 'Pending' || a.status === 'Confirmed');
            const myDoctorIds = [...new Set(myActiveAppts.map(a => a.doctorId))];
            const doctors = DB.getDoctors().filter(d => myDoctorIds.includes(d.id));

            const grid = document.getElementById('doctorsGrid');
            const empty = document.getElementById('emptyState');

            if (!doctors.length) {
                grid.innerHTML = '';
                empty.style.display = 'block';
                return;
            }
            empty.style.display = 'none';

            grid.innerHTML = doctors.map((doc, idx) => {
                const appts = allAppts.filter(a => a.doctorId === doc.id);

                const serving = appts.find(a => a.status === 'Confirmed');
                const completed = appts.filter(a => a.status === 'Completed').sort((a, b) => b.token - a.token);
                const pending = appts.filter(a => a.status === 'Pending').sort((a, b) => a.token - b.token);

                const nowToken = serving ? `#${serving.token}` : '—';
                const prevToken = completed.length ? `#${completed[0].token}` : '—';
                const nextToken = pending.length ? `#${pending[0].token}` : '—';

                // Check if patient has an appointment with this doctor
                const myApptWithDoc = myAppts.find(a => a.doctorId === doc.id && (a.status === 'Pending' || a.status === 'Confirmed'));
                let myPosition = null;
                if (myApptWithDoc && myApptWithDoc.status === 'Pending') {
                    myPosition = pending.findIndex(a => a.id === myApptWithDoc.id) + 1;
                }

                // Status pill
                let pillClass = 'pill-idle', pillText = 'Idle';
                if (serving) { pillClass = 'pill-busy'; pillText = 'In Session'; }
                else if (pending.length) { pillClass = 'pill-active'; pillText = 'Queue Open'; }

                // Est wait for patient
                const estWait = myPosition ? (myPosition * 15) + ' mins' : null;

                // Hospital name
                const hosp = SuperDB.hospitalById(doc.hospitalId);
                const hospName = hosp ? hosp.name : '';

                // Queue items (show up to 5, highlight patient's token)
                const queueItems = pending.slice(0, 5).map(a => {
                    const p = DB.patientById(a.patientId);
                    const isYou = a.patientId === session.id;
                    return `<div class="queue-item${isYou ? ' you' : ''}" style="${isYou ? 'border-color:var(--primary);background:var(--primary-lt);' : ''}">
            <span class="qi-token">#${a.token}</span>
            <span class="qi-name">${isYou ? 'You' : (p ? p.name.split(' ')[0] + ' ' + (p.name.split(' ')[1] || '').charAt(0) + '.' : 'Patient')}</span>
            <span class="qi-time">${a.time}</span>
            ${isYou ? '<span class="qi-you">YOU</span>' : ''}
          </div>`;
                }).join('');

                const morePending = pending.length > 5
                    ? `<div style="text-align:center;font-size:.75rem;color:var(--text-muted);padding:6px 0;">+${pending.length - 5} more in queue</div>`
                    : '';

                return `
        <div class="doc-card" style="animation-delay:${idx * .07}s">
          <div class="doc-card-head">
            <div class="doc-avatar">${initials(doc.name)}</div>
            <div class="doc-info">
              <div class="doc-name">${doc.name}</div>
              <div class="doc-spec">${doc.speciality}${hospName ? ' · ' + hospName : ''}</div>
            </div>
            <span class="doc-status-pill ${pillClass}">${pillText}</span>
          </div>
          <div class="doc-card-body">
            ${myApptWithDoc ? `
            <div class="your-token-banner">
              <span class="ytb-icon">🎫</span>
              <div class="ytb-text">Your token: <strong>#${myApptWithDoc.token}</strong>
                ${myPosition ? ` · Position <strong>${myPosition}</strong> in queue` : ' · Currently being served'}
              </div>
              ${estWait ? `<span class="ytb-pos">~${estWait}</span>` : ''}
            </div>` : ''}

            <div class="token-row">
              <div class="token-box prev">
                <div class="tb-label">Previous</div>
                <div class="tb-num">${prevToken}</div>
              </div>
              <div class="token-box now">
                <div class="tb-label">Now Serving</div>
                <div class="tb-num">${nowToken}</div>
              </div>
              <div class="token-box next">
                <div class="tb-label">Next Up</div>
                <div class="tb-num">${nextToken}</div>
              </div>
            </div>

            <div style="font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text-muted);margin-bottom:8px;">
              Waiting Queue
            </div>
            <div class="queue-strip">
              ${pending.length ? (queueItems + morePending) : '<div class="queue-empty">✅ No one waiting</div>'}
            </div>
          </div>
          <div class="doc-card-foot">
            <div class="foot-stat">
              <strong>${pending.length}</strong> waiting &nbsp;·&nbsp;
              <strong>${completed.length}</strong> served
            </div>
            ${pending.length ? `<div class="foot-wait">⏱ ~${pending.length * 15} min wait</div>` : '<div class="foot-wait" style="color:var(--text-muted);">No wait</div>'}
          </div>
        </div>`;
            }).join('');
        }

        // Init & auto-refresh
        // Derive booked hospital from patient's active appointments (most reliable)
        const myActiveAppt = DB.getAppointments().find(a =>
            a.patientId === session.id && (a.status === 'Pending' || a.status === 'Confirmed')
        );
        if (myActiveAppt && myActiveAppt.hospitalId) {
            activeHospId = myActiveAppt.hospitalId;
        } else {
            // Fallback: use HospitalSession if set
            const selHosp = HospitalSession.get();
            if (selHosp && hospitals.length > 1) activeHospId = selHosp.id;
        }

        renderHospTabs();
        renderCards();
        setInterval(renderCards, 5000);
    </script>
