<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile – QLINIC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      overflow-x: hidden;
    }


    .mesh-bg {
      position: fixed;
      inset: 0;
      z-index: -1;
      overflow: hidden;
    }

    .mesh-bg::before {
      content: '';
      position: absolute;
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(14, 164, 113, .08) 0%, transparent 65%);
      border-radius: 50%;
      top: -180px;
      right: -180px;
      animation: meshDrift1 12s ease-in-out infinite alternate;
    }

    .mesh-bg::after {
      content: '';
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(99, 102, 241, .05) 0%, transparent 65%);
      border-radius: 50%;
      bottom: -120px;
      left: -120px;
      animation: meshDrift2 10s ease-in-out infinite alternate;
    }

    @keyframes meshDrift1 {
      0% {
        transform: translate(0, 0) scale(1)
      }

      100% {
        transform: translate(-50px, 70px) scale(1.12)
      }
    }

    @keyframes meshDrift2 {
      0% {
        transform: translate(0, 0) scale(1)
      }

      100% {
        transform: translate(70px, -50px) scale(1.15)
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(22px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0
      }

      to {
        opacity: 1
      }
    }

    @keyframes scaleIn {
      from {
        opacity: 0;
        transform: scale(.92)
      }

      to {
        opacity: 1;
        transform: scale(1)
      }
    }

    @keyframes loaderGrow {
      from {
        width: 0
      }

      to {
        width: 100%
      }
    }

    @keyframes bounce {

      0%,
      100% {
        transform: translateY(0)
      }

      50% {
        transform: translateY(-5px)
      }
    }

    @keyframes avatarFloat {

      0%,
      100% {
        transform: translateY(0)
      }

      50% {
        transform: translateY(-6px)
      }
    }

    .page-loader {
      position: fixed;
      inset: 0;
      background: #fff;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 18px;
      transition: opacity .5s ease, visibility .5s ease;
    }

    .page-loader.gone {
      opacity: 0;
      visibility: hidden;
    }

    .loader-brand {
      font-family: 'Syne', sans-serif;
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--primary);
    }

    .loader-bar {
      width: 180px;
      height: 3px;
      background: var(--primary-lt, #d1fae5);
      border-radius: 3px;
      overflow: hidden;
    }

    .loader-fill {
      height: 100%;
      background: var(--primary);
      border-radius: 3px;
      animation: loaderGrow 1.1s ease forwards;
    }

    .topbar {
      backdrop-filter: blur(20px) !important;
      background: rgba(255, 255, 255, .88) !important;
      animation: fadeIn .4s ease;
    }

    .topbar-brand {
      font-family: 'Syne', sans-serif !important;
      font-weight: 800 !important;
    }

    .topbar-brand .q {
      display: inline-block;
      animation: bounce 2.5s ease-in-out infinite;
      color: var(--primary);
    }

    .topbar-nav a {
      border-radius: 8px;
      transition: color .2s ease, background .2s ease !important;
    }

    .topbar-nav a:hover {
      color: var(--primary) !important;
      background: var(--primary-lt) !important;
    }

    .card {
      animation: fadeUp .5s ease both;
      transition: box-shadow .25s ease !important;
    }

    .card:hover {
      box-shadow: 0 10px 36px rgba(0, 0, 0, .1) !important;
    }

    .btn {
      transition: all .2s ease !important;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, .18), transparent);
      transform: translateX(-100%);
      transition: transform .4s ease;
    }

    .btn:hover::before {
      transform: translateX(100%);
    }

    .btn-primary:hover {
      transform: translateY(-2px) !important;
      box-shadow: 0 6px 18px var(--primary-glow) !important;
    }

    .form-control {
      transition: border-color .2s ease, box-shadow .2s ease !important;
    }

    .form-control:focus {
      border-color: var(--primary) !important;
      box-shadow: 0 0 0 3px rgba(14, 164, 113, .12) !important;
      outline: none !important;
    }

    .page-header h1 {
      font-family: 'Syne', sans-serif !important;
      font-weight: 800 !important;
      animation: fadeUp .5s ease both;
    }

    .profile-layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 20px;
      align-items: start;
    }

    @media(max-width:768px) {
      .profile-layout {
        grid-template-columns: 1fr;
      }
      .form-grid { grid-template-columns: 1fr !important; }
      .topbar-brand span:last-child { display: none; }
    }

    .profile-sidebar {
      text-align: center;
    }

    .avatar-wrap {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary-lt), var(--primary));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.8rem;
      margin: 0 auto 16px;
      box-shadow: 0 8px 24px var(--primary-glow);
      animation: avatarFloat 3.5s ease-in-out infinite;
      transition: transform .3s ease;
    }

    .avatar-wrap:hover {
      transform: scale(1.08);
    }

    .profile-name {
      font-family: 'Syne', sans-serif;
      font-size: 1.2rem;
      font-weight: 800;
    }

    .profile-email {
      font-size: .85rem;
      color: var(--text-muted);
      margin-top: 3px;
    }

    .profile-tag {
      display: inline-block;
      background: var(--primary-lt);
      color: var(--primary);
      font-size: .75rem;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 20px;
      margin-top: 10px;
    }

    .profile-img-card {
      overflow: hidden;
      border-radius: var(--radius-lg);
      margin-top: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, .1);
    }

    .profile-img-card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      transition: transform .5s ease;
    }

    .profile-img-card:hover img {
      transform: scale(1.05);
    }
  </style>
</head>

<body>
  <div class="mesh-bg"></div>
  <div class="page-loader" id="loader">
    <div class="loader-brand">Q<span style="color:var(--accent,#f59e0b)">.</span>LINIC</div>
    <div class="loader-bar">
      <div class="loader-fill"></div>
    </div>
  </div>

  <header class="topbar">
    <div class="topbar-brand"><span class="q">Q</span><span class="dot">.</span>LINIC
      <span
        style="font-size:.72rem;font-weight:500;color:var(--text-soft);margin-left:8px;background:var(--surface-2);padding:2px 8px;border-radius:4px;">Patient</span>
    </div>

    <button class="menu-toggle" id="menuToggle" style="margin-left:auto;">☰</button>

    <nav class="topbar-nav" id="topbarNav">
      <a href="patient_dashboard.html">Dashboard</a>
      <a href="token_display_board.html">Token Board</a>
      <a href="patient_view_doctors.html">Doctors</a>
      <a href="patient_book_appointment.html">Book</a>
      <a href="patient_my_appointments.html">Appointments</a>
      <a href="patient_profile.html" class="active">Profile</a>
      <a href="#" onclick="Auth.logout()" class="btn btn-outline btn-sm" style="margin-left:8px;">Logout</a>
    </nav>
  </header>

  <div class="page-wrap">
    <div class="page-header">
      <div>
        <h1>My Profile</h1>
        <p>Manage your personal information</p>
      </div>
    </div>
    <div class="profile-layout">
      <div>
        <div class="card text-center anim-scalein">
          <div class="avatar-wrap">👤</div>
          <div class="profile-name" id="sidebarName">—</div>
          <div class="profile-email" id="sidebarEmail">—</div>
          <div class="profile-tag">Patient</div>
        </div>
        <div class="profile-img-card card" style="padding:0;">
          <img src="https://images.unsplash.com/photo-1576091160399-112ba8d25d1d?w=600&q=80" alt="Health" />
        </div>
      </div>
      <div class="card anim-fadeup">
        <div id="alert-box"></div>
        <form id="profileForm" novalidate>
          <div
            style="font-size:.75rem;font-weight:700;color:var(--text-soft);text-transform:uppercase;letter-spacing:.08em;margin-bottom:16px;">
            Personal Information</div>
          <div class="form-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
            <div class="form-group" style="grid-column:1/-1;"><label>Full Name</label><input type="text" id="name"
                class="form-control" required /></div>
            <div class="form-group"><label>Email Address</label><input type="email" id="email" class="form-control"
                required /></div>
            <div class="form-group"><label>Phone Number</label><input type="tel" id="phone" class="form-control"
                required /></div>
            <div class="form-group"><label>Date of Birth</label><input type="date" id="dob" class="form-control"
                required /></div>
            <div class="form-group"><label>Gender</label><select id="gender" class="form-control" required>
                <option>Male</option>
                <option>Female</option>
                <option>Other</option>
              </select></div>
          </div>
          <hr class="divider" />
          <div
            style="font-size:.75rem;font-weight:700;color:var(--text-soft);text-transform:uppercase;letter-spacing:.08em;margin-bottom:16px;">
            Change Password <span style="font-weight:400;text-transform:none;letter-spacing:0;">(leave blank to keep
              current)</span></div>
          <div class="form-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
            <div class="form-group"><label>New Password</label><input type="password" id="newPass" class="form-control"
                placeholder="Min. 6 characters" /></div>
            <div class="form-group"><label>Confirm New Password</label><input type="password" id="confirmPass"
                class="form-control" placeholder="Re-enter" /></div>
          </div>
          <button type="submit" class="btn btn-primary btn-lg">Save Changes →</button>
        </form>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    window.addEventListener('load', () => setTimeout(() => document.getElementById('loader').classList.add('gone'), 1100));

    // Menu Toggle
    const menuToggle = document.getElementById('menuToggle');
    const topbarNav = document.getElementById('topbarNav');
    if (menuToggle && topbarNav) {
      menuToggle.addEventListener('click', () => {
        topbarNav.classList.toggle('open');
        menuToggle.textContent = topbarNav.classList.contains('open') ? '✕' : '☰';
      });
    }
    const session = Auth.requireRole('patient', 'patient_login.html');
    let patient = DB.patientById(session.id);
    document.getElementById('name').value = patient.name;
    document.getElementById('email').value = patient.email;
    document.getElementById('phone').value = patient.phone;
    document.getElementById('dob').value = patient.dob;
    document.getElementById('gender').value = patient.gender;
    document.getElementById('sidebarName').textContent = patient.name;
    document.getElementById('sidebarEmail').textContent = patient.email;
    document.getElementById('profileForm').addEventListener('submit', function (e) {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim().toLowerCase();
      const phone = document.getElementById('phone').value.trim();
      const dob = document.getElementById('dob').value;
      const gender = document.getElementById('gender').value;
      const newPass = document.getElementById('newPass').value;
      const confPass = document.getElementById('confirmPass').value;
      if (!name || !email || !phone || !dob) return showAlert('alert-box', 'Please fill in all required fields.');
      if (newPass && newPass.length < 6) return showAlert('alert-box', 'Password must be at least 6 characters.');
      if (newPass && newPass !== confPass) return showAlert('alert-box', 'Passwords do not match.');
      const patients = DB.getPatients(); const idx = patients.findIndex(p => p.id === session.id);
      if (idx > -1) {
        patients[idx] = { ...patients[idx], name, email, phone, dob, gender };
        if (newPass) patients[idx].password = newPass;
        DB.savePatients(patients); Auth.session = { ...Auth.session, name };
        document.getElementById('sidebarName').textContent = name;
        document.getElementById('sidebarEmail').textContent = email;
        showAlert('alert-box', 'Profile updated successfully!', 'success');
      }
    });
  </script>
</body>

</html>
