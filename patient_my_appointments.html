<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Appointments – QLINIC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      overflow-x: hidden;
    }


    .mesh-bg {
      position: fixed;
      inset: 0;
      z-index: -1;
      overflow: hidden;
    }

    .mesh-bg::before {
      content: '';
      position: absolute;
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(14, 164, 113, .08) 0%, transparent 65%);
      border-radius: 50%;
      top: -180px;
      right: -180px;
      animation: meshDrift1 12s ease-in-out infinite alternate;
    }

    .mesh-bg::after {
      content: '';
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(99, 102, 241, .05) 0%, transparent 65%);
      border-radius: 50%;
      bottom: -120px;
      left: -120px;
      animation: meshDrift2 10s ease-in-out infinite alternate;
    }

    @keyframes meshDrift1 {
      0% {
        transform: translate(0, 0) scale(1)
      }

      100% {
        transform: translate(-50px, 70px) scale(1.12)
      }
    }

    @keyframes meshDrift2 {
      0% {
        transform: translate(0, 0) scale(1)
      }

      100% {
        transform: translate(70px, -50px) scale(1.15)
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(22px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0
      }

      to {
        opacity: 1
      }
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(-12px)
      }

      to {
        opacity: 1;
        transform: translateX(0)
      }
    }

    @keyframes loaderGrow {
      from {
        width: 0
      }

      to {
        width: 100%
      }
    }

    @keyframes bounce {

      0%,
      100% {
        transform: translateY(0)
      }

      50% {
        transform: translateY(-5px)
      }
    }

    .page-loader {
      position: fixed;
      inset: 0;
      background: #fff;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 18px;
      transition: opacity .5s ease, visibility .5s ease;
    }

    .page-loader.gone {
      opacity: 0;
      visibility: hidden;
    }

    .loader-brand {
      font-family: 'Syne', sans-serif;
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--primary);
    }

    .loader-bar {
      width: 180px;
      height: 3px;
      background: var(--primary-lt, #d1fae5);
      border-radius: 3px;
      overflow: hidden;
    }

    .loader-fill {
      height: 100%;
      background: var(--primary);
      border-radius: 3px;
      animation: loaderGrow 1.1s ease forwards;
    }

    .topbar {
      backdrop-filter: blur(20px) !important;
      background: rgba(255, 255, 255, .88) !important;
      animation: fadeIn .4s ease;
    }

    .topbar-brand {
      font-family: 'Syne', sans-serif !important;
      font-weight: 800 !important;
    }

    .topbar-brand .q {
      display: inline-block;
      animation: bounce 2.5s ease-in-out infinite;
      color: var(--primary);
    }

    .topbar-nav a {
      border-radius: 8px;
      transition: color .2s ease, background .2s ease !important;
    }

    .topbar-nav a:hover {
      color: var(--primary) !important;
      background: var(--primary-lt) !important;
    }

    .card {
      animation: fadeUp .5s .1s ease both;
      transition: box-shadow .25s ease !important;
    }

    .card:hover {
      box-shadow: 0 10px 36px rgba(0, 0, 0, .1) !important;
    }

    tbody tr {
      transition: background .15s ease !important;
    }

    tbody tr:hover {
      background: var(--primary-lt) !important;
    }

    .btn {
      transition: all .2s ease !important;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, .18), transparent);
      transform: translateX(-100%);
      transition: transform .4s ease;
    }

    .btn:hover::before {
      transform: translateX(100%);
    }

    .btn-primary:hover {
      transform: translateY(-2px) !important;
      box-shadow: 0 6px 18px var(--primary-glow) !important;
    }

    .form-control:focus {
      border-color: var(--primary) !important;
      box-shadow: 0 0 0 3px rgba(14, 164, 113, .12) !important;
      outline: none !important;
    }

    .page-header h1 {
      font-family: 'Syne', sans-serif !important;
      font-weight: 800 !important;
      animation: fadeUp .5s ease both;
    }

    .filter-row {
      display: flex;
      gap: 8px;
      margin-bottom: 18px;
      flex-wrap: wrap;
      animation: fadeUp .4s .1s ease both;
    }

    @media (max-width: 768px) {
      .page-header {
        flex-direction: column;
        align-items: stretch;
        gap: 12px;
      }

      .page-header a {
        width: 100%;
        margin-left: 0 !important;
      }

      .filter-row {
        flex-direction: column;
        align-items: stretch;
      }

      .filter-row button {
        width: 100% !important;
        margin-left: 0 !important;
      }

      .topbar-brand span:last-child {
        display: none;
      }
    }

    /* ══ QLINIC Global Responsive ══ */
    @media (min-width: 769px) {
      .stats-grid {
        grid-template-columns: repeat(4, 1fr) !important;
      }
    }

    @media (max-width: 768px) {
      .page-wrap {
        padding: 16px 12px 40px !important;
      }

      .card {
        padding: 18px 14px !important;
      }

      .stats-grid {
        grid-template-columns: 1fr 1fr !important;
        gap: 12px;
      }

      .stat-val {
        font-size: 1.8rem !important;
      }

      .table-wrap {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }

      table {
        min-width: 480px;
      }

      th,
      td {
        padding: 10px !important;
        font-size: .8rem;
      }

      .topbar {
        padding: 0 14px !important;
        flex-wrap: wrap;
      }

      .topbar-brand {
        font-size: 1.1rem !important;
      }

      .quick-actions {
        flex-direction: column !important;
      }

      .quick-btn {
        width: 100% !important;
        justify-content: center;
      }

      .page-header {
        flex-direction: column !important;
        align-items: stretch !important;
        gap: 12px;
      }

      .page-header .btn {
        width: 100% !important;
        text-align: center;
      }

      .flex-between {
        flex-direction: column !important;
        align-items: flex-start !important;
        gap: 10px;
      }

      .flex-between .btn {
        align-self: stretch;
        text-align: center;
      }

      .form-row {
        grid-template-columns: 1fr !important;
      }
    }

    @media (max-width: 480px) {
      .topbar-brand span:last-child {
        display: none;
      }

      .stats-grid {
        grid-template-columns: 1fr 1fr !important;
      }
    }

    @media (max-width: 360px) {
      .stats-grid {
        grid-template-columns: 1fr !important;
      }
    }

    @media (max-width: 768px) {
      .filter-row {
        flex-direction: column !important;
        gap: 10px;
      }

      .filter-row select {
        width: 100% !important;
      }
    }
  </style>
</head>

<body>
  <div class="mesh-bg"></div>
  <div class="page-loader" id="loader">
    <div class="loader-brand">Q<span style="color:var(--accent,#f59e0b)">.</span>LINIC</div>
    <div class="loader-bar">
      <div class="loader-fill"></div>
    </div>
  </div>

  <header class="topbar">
    <div class="topbar-brand"><span class="q">Q</span><span class="dot">.</span>LINIC
      <span
        style="font-size:.72rem;font-weight:500;color:var(--text-soft);margin-left:8px;background:var(--surface-2);padding:2px 8px;border-radius:4px;">Patient</span>
    </div>

    <button class="menu-toggle" id="menuToggle" style="margin-left:auto;">☰</button>

    <nav class="topbar-nav" id="topbarNav">
      <a href="patient_dashboard.html">Dashboard</a>
      <a href="patient_token_view.html">Token View</a>
      <a href="patient_view_doctors.html">Doctors</a>
      <a href="patient_book_appointment.html">Book</a>
      <a href="patient_my_appointments.html" class="active">Appointments</a>
      <a href="patient_profile.html">Profile</a>
      <a href="#" onclick="Auth.logout()" class="btn btn-outline btn-sm" style="margin-left:8px;">Logout</a>
    </nav>
  </header>

  <div class="page-wrap">
    <div class="page-header">
      <div>
        <h1>My Appointments</h1>
        <p>All your booked appointments and prescriptions</p>
      </div>
      <a href="patient_book_appointment.html" class="btn btn-primary" style="margin-left:auto;">+ Book New</a>
    </div>
    <div class="filter-row">
      <button class="btn btn-primary btn-sm" onclick="filterAppts('all')" id="btn-all">All</button>
      <button class="btn btn-outline btn-sm" onclick="filterAppts('Pending')" id="btn-Pending">⏳ Pending</button>
      <button class="btn btn-outline btn-sm" onclick="filterAppts('Confirmed')" id="btn-Confirmed">✅ Confirmed</button>
      <button class="btn btn-outline btn-sm" onclick="filterAppts('Completed')" id="btn-Completed">🏁 Completed</button>
      <button class="btn btn-outline btn-sm" onclick="filterAppts('Cancelled')" id="btn-Cancelled">❌ Cancelled</button>
    </div>
    <div class="card anim-fadeup">
      <div id="alert-box"></div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Doctor</th>
              <th>Date</th>
              <th>Time</th>
              <th>Token</th>
              <th>Status</th>
              <th>Prescription</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="apptTable"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/app.js"></script>
  <script>
    window.addEventListener('load', () => setTimeout(() => document.getElementById('loader').classList.add('gone'), 1100));

    // Menu Toggle
    const menuToggle = document.getElementById('menuToggle');
    const topbarNav = document.getElementById('topbarNav');
    if (menuToggle && topbarNav) {
      menuToggle.addEventListener('click', () => {
        topbarNav.classList.toggle('open');
        menuToggle.textContent = topbarNav.classList.contains('open') ? '✕' : '☰';
      });
    }
    const session = Auth.requireRole('patient', 'patient_login.html');
    let currentFilter = 'all';
    async function renderTable() {
      let appts = await DB.getAppointmentsByPatient(session.id);
      const doctors = await DB.getDoctors();
      if (currentFilter !== 'all') appts = appts.filter(a => a.status === currentFilter);
      appts = appts.reverse();
      const tbody = document.getElementById('apptTable');
      if (!appts.length) { tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted" style="padding:32px;">No appointments found. <a href="patient_book_appointment.html">Book one →</a></td></tr>'; return; }
      tbody.innerHTML = appts.map((a, i) => {
        const doc = doctors.find(d => d.id === a.doctor_id);
        const prx = a.prescription ? `<a href="patient_prescription.html?apptId=${a.id}" class="btn btn-outline btn-sm">📄 View Rx</a>` : '<span class="text-muted">—</span>';
        const cancel = (a.status === 'Pending' || a.status === 'Confirmed') ? `<button class="btn btn-danger btn-sm" onclick="cancelAppt('${a.id}')">Cancel</button>` : '';
        return `<tr style="animation:slideIn .35s ${i * .04}s ease both;">
        <td class="text-muted" style="font-size:.8rem;">${i + 1}</td>
        <td><div style="font-weight:700;">${doc ? doc.name : '—'}</div><div class="text-muted" style="font-size:.75rem;">${doc ? doc.speciality : ''}</div></td>
        <td>${formatDate(a.date)}</td><td>${a.time}</td>
        <td><span style="font-family:var(--mono);font-weight:700;color:var(--primary);">#${a.token}</span></td>
        <td>${statusBadge(a.status)}</td><td>${prx}</td><td>${cancel}</td>
      </tr>`;
      }).join('');
    }
    function filterAppts(f) {
      currentFilter = f;
      document.querySelectorAll('[id^="btn-"]').forEach(b => { b.classList.toggle('btn-primary', b.id === `btn-${f}`); b.classList.toggle('btn-outline', b.id !== `btn-${f}`); });
      renderTable();
    }
    async function cancelAppt(id) {
      if (!confirm('Cancel this appointment?')) return;
      await DB.cancelAppointment(id);
      showAlert('alert-box', 'Appointment cancelled.', 'success');
      renderTable();
    }
    renderTable();
  </script>
</body>

</html>
