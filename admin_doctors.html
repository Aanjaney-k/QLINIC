<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Doctors – QLINIC Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      overflow-x: hidden;
    }

    .cursor {
      width: 12px;
      height: 12px;
      background: var(--primary);
      border-radius: 50%;
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: transform .15s ease, background .2s ease;
    }

    .mesh-bg {
      position: fixed;
      inset: 0;
      z-index: -1;
      overflow: hidden;
    }

    .mesh-bg::before {
      content: '';
      position: absolute;
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(14, 164, 113, .08) 0%, transparent 65%);
      border-radius: 50%;
      top: -180px;
      right: -180px;
      animation: meshDrift1 12s ease-in-out infinite alternate;
    }

    .mesh-bg::after {
      content: '';
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(99, 102, 241, .05) 0%, transparent 65%);
      border-radius: 50%;
      bottom: -120px;
      left: -120px;
      animation: meshDrift2 10s ease-in-out infinite alternate;
    }

    @keyframes meshDrift1 {
      0% {
        transform: translate(0, 0) scale(1)
      }

      100% {
        transform: translate(-50px, 70px) scale(1.12)
      }
    }

    @keyframes meshDrift2 {
      0% {
        transform: translate(0, 0) scale(1)
      }

      100% {
        transform: translate(70px, -50px) scale(1.15)
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(22px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0
      }

      to {
        opacity: 1
      }
    }

    @keyframes loaderGrow {
      from {
        width: 0
      }

      to {
        width: 100%
      }
    }

    @keyframes bounce {

      0%,
      100% {
        transform: translateY(0)
      }

      50% {
        transform: translateY(-5px)
      }
    }

    @keyframes numberPop {
      0% {
        transform: scale(.8);
        opacity: 0
      }

      60% {
        transform: scale(1.1)
      }

      100% {
        transform: scale(1);
        opacity: 1
      }
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(20px) scale(.97)
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1)
      }
    }

    .page-loader {
      position: fixed;
      inset: 0;
      background: #fff;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 18px;
      transition: opacity .5s ease, visibility .5s ease;
    }

    .page-loader.gone {
      opacity: 0;
      visibility: hidden;
    }

    .loader-brand {
      font-family: 'Syne', sans-serif;
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--primary);
    }

    .loader-bar {
      width: 180px;
      height: 3px;
      background: var(--primary-lt, #d1fae5);
      border-radius: 3px;
      overflow: hidden;
    }

    .loader-fill {
      height: 100%;
      background: var(--primary);
      border-radius: 3px;
      animation: loaderGrow 1.1s ease forwards;
    }

    .scroll-top {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 44px;
      height: 44px;
      background: var(--primary);
      color: #fff;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-size: 1.2rem;
      box-shadow: 0 4px 16px var(--primary-glow);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: translateY(14px);
      transition: all .2s ease;
      z-index: 200;
    }

    .scroll-top.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .scroll-top:hover {
      background: var(--primary-dk);
      transform: translateY(-2px);
    }

    .topbar {
      backdrop-filter: blur(20px) !important;
      background: rgba(255, 255, 255, .88) !important;
      animation: fadeIn .4s ease;
    }

    .topbar-brand {
      font-family: 'Syne', sans-serif !important;
      font-weight: 800 !important;
    }

    .topbar-brand .q {
      display: inline-block;
      animation: bounce 2.5s ease-in-out infinite;
      color: var(--primary);
    }

    .topbar-nav a {
      border-radius: 8px;
      transition: color .2s ease, background .2s ease !important;
    }

    .topbar-nav a:hover {
      color: var(--primary) !important;
      background: var(--primary-lt) !important;
    }

    .stat-card {
      transition: transform .25s ease, box-shadow .25s ease !important;
      animation: fadeUp .5s ease both;
    }

    .stat-card:hover {
      transform: translateY(-6px) !important;
      box-shadow: 0 16px 36px rgba(0, 0, 0, .1) !important;
    }

    .stat-card.d1 {
      animation-delay: .05s
    }

    .stat-card.d2 {
      animation-delay: .12s
    }

    .stat-card.d3 {
      animation-delay: .19s
    }

    .stat-val {
      animation: numberPop .6s .3s ease both;
    }

    .btn {
      transition: all .2s ease !important;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, .18), transparent);
      transform: translateX(-100%);
      transition: transform .4s ease;
    }

    .btn:hover::before {
      transform: translateX(100%);
    }

    .btn-primary:hover {
      transform: translateY(-2px) !important;
      box-shadow: 0 6px 18px var(--primary-glow) !important;
    }

    .btn-outline:hover {
      transform: translateY(-1px) !important;
    }

    .btn-danger:hover {
      transform: translateY(-1px) !important;
    }

    .form-control {
      transition: border-color .2s ease, box-shadow .2s ease !important;
    }

    .form-control:focus {
      border-color: var(--primary) !important;
      box-shadow: 0 0 0 3px rgba(14, 164, 113, .12) !important;
      outline: none !important;
    }

    .modal {
      animation: fadeUp .3s ease both !important;
    }

    .page-header h1 {
      font-family: 'Syne', sans-serif !important;
      font-weight: 800 !important;
      animation: fadeUp .5s ease both;
    }

    /* Doctor grid */
    .doctor-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 18px;
    }

    .doc-card {
      background: var(--surface);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      border: 1px solid rgba(226, 232, 240, .8);
      overflow: hidden;
      transition: transform .3s ease, box-shadow .3s ease;
      animation: cardIn .5s ease both;
      position: relative;
    }

    .doc-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), #06b6d4);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform .4s ease;
    }

    .doc-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 48px rgba(0, 0, 0, .13);
    }

    .doc-card:hover::before {
      transform: scaleX(1);
    }

    .doc-card-top {
      height: 110px;
      position: relative;
      overflow: hidden;
    }

    .doc-card-top img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform .5s ease;
    }

    .doc-card:hover .doc-card-top img {
      transform: scale(1.08);
    }

    .doc-card-top-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 30%, rgba(0, 0, 0, .45));
    }

    .doc-avail-badge {
      position: absolute;
      top: 10px;
      right: 10px;
    }

    .doc-card-body {
      padding: 16px 18px 18px;
    }

    .doc-avatar-wrap {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      margin-top: -28px;
      margin-bottom: 10px;
    }

    .doc-avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: var(--primary-lt);
      border: 3px solid #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      box-shadow: var(--shadow-xs);
      flex-shrink: 0;
      transition: transform .3s ease;
    }

    .doc-card:hover .doc-avatar {
      transform: scale(1.1) rotate(-5deg);
    }

    .doc-id {
      font-size: .72rem;
      font-family: var(--mono);
      color: var(--text-soft);
    }

    .doc-name {
      font-size: .975rem;
      font-weight: 800;
      font-family: 'Syne', sans-serif;
    }

    .doc-spec {
      font-size: .8rem;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .doc-phone {
      font-size: .8rem;
      color: var(--text-soft);
      margin-top: 3px;
    }

    .doc-actions {
      display: flex;
      gap: 8px;
      margin-top: 14px;
      align-items: center;
    }
  </style>
</head>

<body>

  <div class="cursor" id="cursor"></div>
  <div class="mesh-bg"></div>

  <div class="page-loader" id="loader">
    <div class="loader-brand">Q<span style="color:var(--accent,#f59e0b)">.</span>LINIC</div>
    <div class="loader-bar">
      <div class="loader-fill"></div>
    </div>
  </div>

  <button class="scroll-top" id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

  <header class="topbar">
    <div class="topbar-brand"><span class="q">Q</span><span class="dot">.</span>LINIC
      <span
        style="font-size:.72rem;font-weight:500;color:var(--text-soft);margin-left:8px;background:var(--surface-2);padding:2px 8px;border-radius:4px;">Admin</span>
    </div>
    <nav class="topbar-nav">
      <a href="admin_dashboard.html">Dashboard</a>
      <a href="admin_patients.html">Patients</a>
      <a href="admin_doctors.html" class="active">Doctors</a>
      <a href="admin_appointments.html">Appointments</a>
      <a href="#" onclick="Auth.logout()" class="btn btn-outline btn-sm" style="margin-left:8px;">Logout</a>
    </nav>
  </header>

  <div class="page-wrap">
    <div class="page-header">
      <div>
        <h1>Manage Doctors</h1>
        <p>Add, remove, or toggle doctor availability</p>
      </div>
      <button class="btn btn-primary" style="margin-left:auto;" onclick="openAddModal()">+ Add Doctor</button>
    </div>

    <div id="alert-box" style="max-width:600px;"></div>

    <div class="stats-grid" style="margin-bottom:20px;">
      <div class="stat-card d1">
        <div class="stat-icon">🩺</div>
        <div class="stat-val" id="totalDocs">0</div>
        <div class="stat-lbl">Total Doctors</div>
      </div>
      <div class="stat-card d2">
        <div class="stat-icon" style="background:#dcfce7;">✅</div>
        <div class="stat-val" id="availDocs" style="color:#15803d;">0</div>
        <div class="stat-lbl">Available</div>
      </div>
      <div class="stat-card d3">
        <div class="stat-icon" style="background:#fee2e2;">❌</div>
        <div class="stat-val" id="unavailDocs" style="color:var(--danger);">0</div>
        <div class="stat-lbl">Unavailable</div>
      </div>
    </div>

    <div class="doctor-grid" id="doctorGrid"></div>
  </div>

  <!-- Add Doctor Modal -->
  <div class="modal-overlay" id="addModal">
    <div class="modal">
      <div class="modal-header">
        <h3 style="font-family:'Syne',sans-serif;">Add New Doctor</h3>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div id="modal-alert"></div>
      <form id="addDoctorForm" novalidate>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
          <div class="form-group" style="grid-column:1/-1;">
            <label>Full Name</label>
            <input type="text" id="docName" class="form-control" placeholder="Dr. Full Name" required />
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="docEmail" class="form-control" placeholder="doctor@qlinic.com" required />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="docPass" class="form-control" placeholder="Set login password" required />
          </div>
          <div class="form-group">
            <label>Speciality</label>
            <input type="text" id="docSpec" class="form-control" placeholder="e.g. General Medicine" required />
          </div>
          <div class="form-group">
            <label>Phone</label>
            <input type="tel" id="docPhone" class="form-control" placeholder="10-digit number" required />
          </div>
        </div>
        <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:4px;">
          <button type="button" class="btn btn-outline" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Add Doctor →</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    window.addEventListener('load', () => setTimeout(() => document.getElementById('loader').classList.add('gone'), 1100));

    const cur = document.getElementById('cursor');
    document.addEventListener('mousemove', e => { cur.style.left = e.clientX + 'px'; cur.style.top = e.clientY + 'px'; });
    document.querySelectorAll('a,button').forEach(el => {
      el.addEventListener('mouseenter', () => { cur.style.transform = 'translate(-50%,-50%) scale(2)'; cur.style.background = 'var(--accent,#f59e0b)'; });
      el.addEventListener('mouseleave', () => { cur.style.transform = 'translate(-50%,-50%) scale(1)'; cur.style.background = 'var(--primary)'; });
    });

    const stb = document.getElementById('scrollTop');
    window.addEventListener('scroll', () => stb.classList.toggle('visible', window.scrollY > 300));

    Auth.requireRole('admin', 'admin_login.html');

    const docPhotos = [
      'https://images.unsplash.com/photo-1559839734-2b71ea197ec2?w=600&q=80',
      'https://images.unsplash.com/photo-1612349317150-e413f6a5b16d?w=600&q=80',
      'https://images.unsplash.com/photo-1622253692010-333f2da6031d?w=600&q=80',
      'https://images.unsplash.com/photo-1594824476967-48c8b964273f?w=600&q=80',
      'https://images.unsplash.com/photo-1582750433449-648ed127bb54?w=600&q=80',
    ];

    function animCount(el, target) {
      let c = 0; const step = Math.max(1, Math.ceil(target / 20));
      const iv = setInterval(() => { c = Math.min(c + step, target); el.textContent = c; if (c >= target) clearInterval(iv); }, 50);
    }

    function renderDoctors() {
      const doctors = DB.getDoctors(), appts = DB.getAppointments();
      animCount(document.getElementById('totalDocs'), doctors.length);
      animCount(document.getElementById('availDocs'), doctors.filter(d => d.available).length);
      animCount(document.getElementById('unavailDocs'), doctors.filter(d => !d.available).length);

      const grid = document.getElementById('doctorGrid');
      if (!doctors.length) {
        grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:48px;color:var(--text-muted);">No doctors yet. Add one using the button above.</div>';
        return;
      }
      grid.innerHTML = doctors.map((d, i) => {
        const count = appts.filter(a => a.doctorId === d.id).length;
        return `
      <div class="doc-card" style="animation-delay:${i * .07}s;">
        <div class="doc-card-top">
          <img src="${docPhotos[i % docPhotos.length]}" alt="${d.name}" loading="lazy"/>
          <div class="doc-card-top-overlay"></div>
          <div class="doc-avail-badge">${d.available ? '<span class="badge badge-green">Available</span>' : '<span class="badge badge-red">Unavailable</span>'}</div>
        </div>
        <div class="doc-card-body">
          <div class="doc-avatar-wrap">
            <div class="doc-avatar">🩺</div>
            <div class="doc-id">${d.id}</div>
          </div>
          <div class="doc-name">${d.name}</div>
          <div class="doc-spec">🏷️ ${d.speciality}</div>
          <div class="doc-phone">📞 ${d.phone} · 📧 ${d.email}</div>
          <div style="margin-top:8px;"><span class="badge badge-blue">${count} appointment${count !== 1 ? 's' : ''}</span></div>
          <div class="doc-actions">
            <button class="btn btn-outline btn-sm" onclick="toggleAvail('${d.id}')" style="flex:1;">
              ${d.available ? 'Mark Unavailable' : 'Mark Available'}
            </button>
            <button class="btn btn-danger btn-sm" onclick="deleteDoctor('${d.id}','${d.name.replace(/'/g, '')}',${count})">Delete</button>
          </div>
        </div>
      </div>`;
      }).join('');
    }

    function toggleAvail(id) {
      const docs = DB.getDoctors(), idx = docs.findIndex(d => d.id === id);
      if (idx > -1) { docs[idx].available = !docs[idx].available; DB.saveDoctors(docs); renderDoctors(); }
    }

    function deleteDoctor(id, name, count) {
      const msg = count > 0 ? `${name} has ${count} appointment(s). Deleting will remove all their appointments. Continue?` : `Delete Dr. ${name}? This cannot be undone.`;
      if (!confirm(msg)) return;
      if (count > 0) DB.saveAppointments(DB.getAppointments().filter(a => a.doctorId !== id));
      DB.saveDoctors(DB.getDoctors().filter(d => d.id !== id));
      showAlert('alert-box', `${name} has been removed.`, 'success');
      renderDoctors();
    }

    function openAddModal() { document.getElementById('addModal').classList.add('open'); }
    function closeModal() {
      document.getElementById('addModal').classList.remove('open');
      document.getElementById('addDoctorForm').reset();
      document.getElementById('modal-alert').innerHTML = '';
    }

    document.getElementById('addDoctorForm').addEventListener('submit', function (e) {
      e.preventDefault();
      const name = document.getElementById('docName').value.trim();
      const email = document.getElementById('docEmail').value.trim().toLowerCase();
      const pass = document.getElementById('docPass').value;
      const spec = document.getElementById('docSpec').value.trim();
      const phone = document.getElementById('docPhone').value.trim();
      if (!name || !email || !pass || !spec || !phone) return showAlert('modal-alert', 'Please fill in all fields.');
      const doctors = DB.getDoctors();
      if (doctors.find(d => d.email === email)) return showAlert('modal-alert', 'A doctor with this email already exists.');
      doctors.push({ id: DB.nextId('D', doctors), name, email, password: pass, speciality: spec, phone, available: true });
      DB.saveDoctors(doctors);
      closeModal();
      showAlert('alert-box', `${name} added successfully!`, 'success');
      renderDoctors();
    });

    renderDoctors();
  </script>
</body>

</html>
