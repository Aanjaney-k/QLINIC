<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Token – QLINIC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      overflow-x: hidden;
    }


    .mesh-bg {
      position: fixed;
      inset: 0;
      z-index: -1;
      overflow: hidden;
    }

    .mesh-bg::before {
      content: '';
      position: absolute;
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(14, 164, 113, .08) 0%, transparent 65%);
      border-radius: 50%;
      top: -180px;
      right: -180px;
      animation: meshDrift1 12s ease-in-out infinite alternate;
    }

    @keyframes meshDrift1 {
      0% {
        transform: translate(0, 0) scale(1)
      }

      100% {
        transform: translate(-50px, 70px) scale(1.1)
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(22px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0
      }

      to {
        opacity: 1
      }
    }

    @keyframes scaleIn {
      from {
        opacity: 0;
        transform: scale(.88)
      }

      to {
        opacity: 1;
        transform: scale(1)
      }
    }

    @keyframes loaderGrow {
      from {
        width: 0
      }

      to {
        width: 100%
      }
    }

    @keyframes bounce {

      0%,
      100% {
        transform: translateY(0)
      }

      50% {
        transform: translateY(-5px)
      }
    }

    @keyframes pulseRing {

      0%,
      100% {
        transform: scale(1)
      }

      50% {
        transform: scale(1.06)
      }
    }

    @keyframes tokenGlow {

      0%,
      100% {
        text-shadow: none
      }

      50% {
        text-shadow: 0 0 40px rgba(255, 255, 255, .6)
      }
    }

    @keyframes confettiDrop {
      0% {
        transform: translateY(-20px) rotate(0deg);
        opacity: 1
      }

      100% {
        transform: translateY(200px) rotate(720deg);
        opacity: 0
      }
    }

    .page-loader {
      position: fixed;
      inset: 0;
      background: #fff;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 18px;
      transition: opacity .5s ease, visibility .5s ease;
    }

    .page-loader.gone {
      opacity: 0;
      visibility: hidden;
    }

    .loader-brand {
      font-family: 'Syne', sans-serif;
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--primary);
    }

    .loader-bar {
      width: 180px;
      height: 3px;
      background: var(--primary-lt, #d1fae5);
      border-radius: 3px;
      overflow: hidden;
    }

    .loader-fill {
      height: 100%;
      background: var(--primary);
      border-radius: 3px;
      animation: loaderGrow 1.1s ease forwards;
    }

    .topbar {
      backdrop-filter: blur(20px) !important;
      background: rgba(255, 255, 255, .88) !important;
      animation: fadeIn .4s ease;
    }

    .topbar-brand {
      font-family: 'Syne', sans-serif !important;
      font-weight: 800 !important;
    }

    .topbar-brand .q {
      display: inline-block;
      animation: bounce 2.5s ease-in-out infinite;
      color: var(--primary);
    }

    .topbar-nav a {
      border-radius: 8px;
      transition: color .2s ease, background .2s ease !important;
    }

    .topbar-nav a:hover {
      color: var(--primary) !important;
      background: var(--primary-lt) !important;
    }

    .btn {
      transition: all .2s ease !important;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, .18), transparent);
      transform: translateX(-100%);
      transition: transform .4s ease;
    }

    .btn:hover::before {
      transform: translateX(100%);
    }

    .btn-primary:hover {
      transform: translateY(-2px) !important;
      box-shadow: 0 6px 18px var(--primary-glow) !important;
    }

    .btn-outline:hover {
      transform: translateY(-1px) !important;
    }

    .token-page {
      max-width: 600px;
      margin: 0 auto;
      padding: 28px 20px;
    }

    .token-hero {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dk) 100%);
      border-radius: var(--radius-xl);
      padding: 48px 32px;
      text-align: center;
      color: #fff;
      position: relative;
      overflow: hidden;
      margin-bottom: 20px;
      animation: scaleIn .5s ease both;
      box-shadow: 0 24px 64px rgba(14, 164, 113, .35);
    }

    .token-hero::before {
      content: '';
      position: absolute;
      top: -60px;
      right: -60px;
      width: 200px;
      height: 200px;
      background: rgba(255, 255, 255, .08);
      border-radius: 50%;
    }

    .token-hero::after {
      content: '';
      position: absolute;
      bottom: -40px;
      left: -40px;
      width: 150px;
      height: 150px;
      background: rgba(255, 255, 255, .06);
      border-radius: 50%;
    }

    .token-check {
      font-size: 3rem;
      margin-bottom: 8px;
      animation: bounce 2s ease-in-out infinite;
    }

    .token-booked {
      font-size: .875rem;
      opacity: .8;
      margin-bottom: 20px;
      font-weight: 500;
    }

    .token-label-text {
      font-size: .85rem;
      opacity: .7;
      text-transform: uppercase;
      letter-spacing: .1em;
      font-weight: 600;
    }

    .big-token {
      font-family: 'Syne', sans-serif;
      font-size: 7rem;
      font-weight: 800;
      line-height: 1;
      margin: 8px 0;
      animation: pulseRing 2.5s ease infinite, tokenGlow 2.5s ease infinite;
      display: inline-block;
      position: relative;
      z-index: 1;
    }

    .token-advice {
      font-size: .875rem;
      opacity: .75;
      margin-top: 12px;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }

    @media (max-width: 600px) {
      .big-token {
        font-size: 5rem;
      }

      .token-hero {
        padding: 32px 20px;
      }

      .detail-grid {
        grid-template-columns: 1fr;
      }

      .token-page>div:last-of-type {
        grid-template-columns: 1fr !important;
      }
    }

    .detail-item {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 16px;
      text-align: center;
      box-shadow: var(--shadow-xs);
      border: 1px solid var(--border);
      animation: fadeUp .5s ease both;
      transition: transform .2s ease, box-shadow .2s ease;
    }

    .detail-item:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, .1);
    }

    .detail-item .di-label {
      font-size: .72rem;
      font-weight: 700;
      color: var(--text-soft);
      text-transform: uppercase;
      letter-spacing: .07em;
      margin-bottom: 5px;
    }

    .detail-item .di-val {
      font-size: .95rem;
      font-weight: 700;
      color: var(--text);
    }

    .detail-item.d1 {
      animation-delay: .1s
    }

    .detail-item.d2 {
      animation-delay: .17s
    }

    .detail-item.d3 {
      animation-delay: .24s
    }

    .detail-item.d4 {
      animation-delay: .31s
    }

    /* Confetti particles */
    .confetti {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 2px;
      animation: confettiDrop var(--dur, 2s) var(--delay, 0s) ease-in forwards;
    }
  </style>
</head>

<body>
  <div class="mesh-bg"></div>
  <div class="page-loader" id="loader">
    <div class="loader-brand">Q<span style="color:var(--accent,#f59e0b)">.</span>LINIC</div>
    <div class="loader-bar">
      <div class="loader-fill"></div>
    </div>
  </div>

  <header class="topbar">
    <div class="topbar-brand"><span class="q">Q</span><span class="dot">.</span>LINIC
      <span
        style="font-size:.72rem;font-weight:500;color:var(--text-soft);margin-left:8px;background:var(--surface-2);padding:2px 8px;border-radius:4px;">Patient</span>
    </div>

    <button class="menu-toggle" id="menuToggle" style="margin-left:auto;">☰</button>

    <nav class="topbar-nav" id="topbarNav">
      <a href="patient_dashboard.html">Dashboard</a>
      <a href="token_display_board.html">Token Board</a>
      <a href="patient_view_doctors.html">Doctors</a>
      <a href="patient_book_appointment.html">Book</a>
      <a href="patient_my_appointments.html">Appointments</a>
      <a href="patient_profile.html">Profile</a>
      <a href="#" onclick="Auth.logout()" class="btn btn-outline btn-sm" style="margin-left:8px;">Logout</a>
    </nav>
  </header>

  <div class="token-page">
    <div class="token-hero" id="tokenHero">
      <div class="token-check">🎉</div>
      <div class="token-booked">Appointment Confirmed!</div>
      <div class="token-label-text">Your Queue Token</div>
      <div class="big-token" id="tokenNum">—</div>
      <div class="token-advice">Show this number when you arrive at the clinic</div>
    </div>

    <div class="detail-grid" id="detailGrid">
      <div class="detail-item" style="grid-column:1/-1;">
        <div class="di-label">Loading…</div>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;animation:fadeUp .5s .4s ease both;">
      <a href="patient_my_appointments.html" class="btn btn-primary btn-lg" style="justify-content:center;">View
        Appointments</a>
      <a href="patient_book_appointment.html" class="btn btn-outline btn-lg" style="justify-content:center;">Book
        Another</a>
    </div>
    <div style="text-align:center;margin-top:16px;animation:fadeUp .5s .5s ease both;">
      <a href="patient_dashboard.html" class="text-muted" style="font-size:.8125rem;">← Back to Dashboard</a>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    window.addEventListener('load', () => setTimeout(() => document.getElementById('loader').classList.add('gone'), 1100));

    // Menu Toggle
    const menuToggle = document.getElementById('menuToggle');
    const topbarNav = document.getElementById('topbarNav');
    if (menuToggle && topbarNav) {
      menuToggle.addEventListener('click', () => {
        topbarNav.classList.toggle('open');
        menuToggle.textContent = topbarNav.classList.contains('open') ? '✕' : '☰';
      });
    }

    // Confetti
    const hero = document.getElementById('tokenHero');
    const colors = ['#fff', 'rgba(255,255,255,.7)', 'var(--accent,#f59e0b)', 'rgba(255,255,255,.4)'];
    for (let i = 0; i < 16; i++) {
      const c = document.createElement('div');
      c.className = 'confetti';
      c.style.cssText = `left:${Math.random() * 90 + 5}%;top:${Math.random() * 30}%;background:${colors[i % colors.length]};--dur:${1.5 + Math.random() * 2}s;--delay:${Math.random() * 1.5}s;transform:rotate(${Math.random() * 360}deg);`;
      hero.appendChild(c);
    }

    Auth.requireRole('patient', 'patient_login.html');
    const raw = sessionStorage.getItem('ql_last_appt');
    if (!raw) {
      document.getElementById('detailGrid').innerHTML = '<div class="detail-item" style="grid-column:1/-1"><div class="di-label">No recent booking found</div></div>';
    } else {
      const appt = JSON.parse(raw);
      // Support both old camelCase (fallback) and new snake_case field names
      const doctorId = appt.doctor_id || appt.doctorId;
      document.getElementById('tokenNum').textContent = `#${appt.token}`;
      DB.doctorById(doctorId).then(doc => {
        document.getElementById('detailGrid').innerHTML = `
      <div class="detail-item d1"><div class="di-label">Doctor</div><div class="di-val">${doc ? doc.name : '—'}</div></div>
      <div class="detail-item d2"><div class="di-label">Speciality</div><div class="di-val">${doc ? doc.speciality : '—'}</div></div>
      <div class="detail-item d3"><div class="di-label">Date</div><div class="di-val">${formatDate(appt.date)}</div></div>
      <div class="detail-item d4"><div class="di-label">Time</div><div class="di-val">${appt.time}</div></div>
      <div class="detail-item d1" style="grid-column:1/-1"><div class="di-label">Status</div><div class="di-val">${statusBadge(appt.status)}</div></div>
    `;
      });
    }
  </script>
</body>

</html>
