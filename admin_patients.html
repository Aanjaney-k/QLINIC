<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Patients – QLINIC Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      overflow-x: hidden;
    }


    .mesh-bg {
      position: fixed;
      inset: 0;
      z-index: -1;
      overflow: hidden;
    }

    .mesh-bg::before {
      content: '';
      position: absolute;
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(14, 164, 113, .08) 0%, transparent 65%);
      border-radius: 50%;
      top: -180px;
      right: -180px;
      animation: meshDrift1 12s ease-in-out infinite alternate;
    }

    .mesh-bg::after {
      content: '';
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(99, 102, 241, .05) 0%, transparent 65%);
      border-radius: 50%;
      bottom: -120px;
      left: -120px;
      animation: meshDrift2 10s ease-in-out infinite alternate;
    }

    @keyframes meshDrift1 {
      0% {
        transform: translate(0, 0) scale(1)
      }

      100% {
        transform: translate(-50px, 70px) scale(1.12)
      }
    }

    @keyframes meshDrift2 {
      0% {
        transform: translate(0, 0) scale(1)
      }

      100% {
        transform: translate(70px, -50px) scale(1.15)
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(22px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0
      }

      to {
        opacity: 1
      }
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(-12px)
      }

      to {
        opacity: 1;
        transform: translateX(0)
      }
    }

    @keyframes loaderGrow {
      from {
        width: 0
      }

      to {
        width: 100%
      }
    }

    @keyframes bounce {

      0%,
      100% {
        transform: translateY(0)
      }

      50% {
        transform: translateY(-5px)
      }
    }

    @keyframes numberPop {
      0% {
        transform: scale(.8);
        opacity: 0
      }

      60% {
        transform: scale(1.1)
      }

      100% {
        transform: scale(1);
        opacity: 1
      }
    }

    @keyframes avatarPop {
      0% {
        transform: scale(0) rotate(-10deg)
      }

      80% {
        transform: scale(1.1) rotate(2deg)
      }

      100% {
        transform: scale(1) rotate(0)
      }
    }

    .page-loader {
      position: fixed;
      inset: 0;
      background: #fff;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 18px;
      transition: opacity .5s ease, visibility .5s ease;
    }

    .page-loader.gone {
      opacity: 0;
      visibility: hidden;
    }

    .loader-brand {
      font-family: 'Syne', sans-serif;
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--primary);
    }

    .loader-bar {
      width: 180px;
      height: 3px;
      background: var(--primary-lt, #d1fae5);
      border-radius: 3px;
      overflow: hidden;
    }

    .loader-fill {
      height: 100%;
      background: var(--primary);
      border-radius: 3px;
      animation: loaderGrow 1.1s ease forwards;
    }

    .scroll-top {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 44px;
      height: 44px;
      background: var(--primary);
      color: #fff;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-size: 1.2rem;
      box-shadow: 0 4px 16px var(--primary-glow);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: translateY(14px);
      transition: all .2s ease;
      z-index: 200;
    }

    .scroll-top.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .scroll-top:hover {
      background: var(--primary-dk);
      transform: translateY(-2px);
    }

    .topbar {
      backdrop-filter: blur(20px) !important;
      background: rgba(255, 255, 255, .88) !important;
      animation: fadeIn .4s ease;
    }

    .topbar-brand {
      font-family: 'Syne', sans-serif !important;
      font-weight: 800 !important;
    }

    .topbar-brand .q {
      display: inline-block;
      animation: bounce 2.5s ease-in-out infinite;
      color: var(--primary);
    }

    .topbar-nav a {
      border-radius: 8px;
      transition: color .2s ease, background .2s ease !important;
    }

    .topbar-nav a:hover {
      color: var(--primary) !important;
      background: var(--primary-lt) !important;
    }

    .stat-card {
      transition: transform .25s ease, box-shadow .25s ease !important;
      animation: fadeUp .5s ease both;
    }

    .stat-card:hover {
      transform: translateY(-6px) !important;
      box-shadow: 0 16px 36px rgba(0, 0, 0, .1) !important;
    }

    .stat-card.d1 {
      animation-delay: .05s
    }

    .stat-card.d2 {
      animation-delay: .12s
    }

    .stat-card.d3 {
      animation-delay: .19s
    }

    .stat-val {
      animation: numberPop .6s .3s ease both;
    }

    .card {
      animation: fadeUp .5s .2s ease both;
      transition: box-shadow .25s ease !important;
    }

    .card:hover {
      box-shadow: 0 10px 36px rgba(0, 0, 0, .1) !important;
    }

    tbody tr {
      transition: background .15s ease !important;
    }

    tbody tr:hover {
      background: var(--primary-lt) !important;
    }

    .btn {
      transition: all .2s ease !important;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, .18), transparent);
      transform: translateX(-100%);
      transition: transform .4s ease;
    }

    .btn:hover::before {
      transform: translateX(100%);
    }

    .btn-primary:hover {
      transform: translateY(-2px) !important;
      box-shadow: 0 6px 18px var(--primary-glow) !important;
    }

    .form-control {
      transition: border-color .2s ease, box-shadow .2s ease !important;
    }

    .form-control:focus {
      border-color: var(--primary) !important;
      box-shadow: 0 0 0 3px rgba(14, 164, 113, .12) !important;
      outline: none !important;
    }

    .page-header h1 {
      font-family: 'Syne', sans-serif !important;
      font-weight: 800 !important;
      animation: fadeUp .5s ease both;
    }

    .page-header p {
      animation: fadeUp .5s .08s ease both;
    }

    /* Patient avatar */
    .patient-avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: var(--primary-lt);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      font-weight: 700;
      color: var(--primary);
      flex-shrink: 0;
      transition: transform .2s ease, background .2s ease;
      border: 2px solid rgba(14, 164, 113, .2);
    }

    tbody tr:hover .patient-avatar {
      transform: scale(1.15);
      background: var(--primary);
      color: #fff;
    }

    /* Search bar */
    .input-wrap .form-control:focus {
      transform: none;
    }

    @media (max-width: 768px) {
      .page-header { flex-direction: column; align-items: stretch; gap: 16px; }
      .search-wrap { margin-left: 0 !important; width: 100%; }
      .search-wrap .input-wrap { width: 100% !important; }
      .stats-grid { grid-template-columns: 1fr; }
      .topbar-brand span:last-child { display: none; }
    }
  </style>
</head>

<body>

  <div class="mesh-bg"></div>

  <div class="page-loader" id="loader">
    <div class="loader-brand">Q<span style="color:var(--accent,#f59e0b)">.</span>LINIC</div>
    <div class="loader-bar">
      <div class="loader-fill"></div>
    </div>
  </div>

  <button class="scroll-top" id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

  <header class="topbar">
    <div class="topbar-brand"><span class="q">Q</span><span class="dot">.</span>LINIC
      <span
        style="font-size:.72rem;font-weight:500;color:var(--text-soft);margin-left:8px;background:var(--surface-2);padding:2px 8px;border-radius:4px;">Admin</span>
    </div>
    
    <button class="menu-toggle" id="menuToggle" style="margin-left:auto;">☰</button>

    <nav class="topbar-nav" id="topbarNav">
      <a href="admin_dashboard.html">Dashboard</a>
      <a href="admin_patients.html" class="active">Patients</a>
      <a href="admin_doctors.html">Doctors</a>
      <a href="admin_appointments.html">Appointments</a>
      <a href="#" onclick="Auth.logout()" class="btn btn-outline btn-sm" style="margin-left:8px;">Logout</a>
    </nav>
  </header>

  <div class="page-wrap">
    <div class="page-header">
      <div>
        <h1>All Patients</h1>
        <p>Registered patients in the system</p>
      </div>
      <div style="margin-left:auto;" class="search-wrap">
        <div class="input-wrap" style="width:280px;">
          <span class="input-ico">🔍</span>
          <input type="text" id="searchInput" class="form-control" placeholder="Search name or email…"
            oninput="renderTable()" />
        </div>
      </div>
    </div>

    <div class="stats-grid" style="margin-bottom:20px;">
      <div class="stat-card d1">
        <div class="stat-icon">👥</div>
        <div class="stat-val" id="totalCount">0</div>
        <div class="stat-lbl">Total Patients</div>
      </div>
      <div class="stat-card d2">
        <div class="stat-icon" style="background:#fef9c3;">🆕</div>
        <div class="stat-val" id="newCount" style="color:var(--accent);">0</div>
        <div class="stat-lbl">This Month</div>
      </div>
      <div class="stat-card d3">
        <div class="stat-icon" style="background:#dcfce7;">📅</div>
        <div class="stat-val" id="withAppts" style="color:#15803d;">0</div>
        <div class="stat-lbl">Have Appointments</div>
      </div>
    </div>

    <div class="card anim-fadeup">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Patient</th>
              <th>Email</th>
              <th>Phone</th>
              <th>Gender</th>
              <th>DOB</th>
              <th>Appointments</th>
            </tr>
          </thead>
          <tbody id="patientTable"></tbody>
        </table>
      </div>
      <div id="tableFooter"
        style="font-size:.8rem;color:var(--text-muted);margin-top:14px;padding-top:14px;border-top:1px solid var(--border);">
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    window.addEventListener('load', () => setTimeout(() => document.getElementById('loader').classList.add('gone'), 1100));


    // Menu Toggle
    const menuToggle = document.getElementById('menuToggle');
    const topbarNav = document.getElementById('topbarNav');
    if (menuToggle && topbarNav) {
      menuToggle.addEventListener('click', () => {
        topbarNav.classList.toggle('open');
        menuToggle.textContent = topbarNav.classList.contains('open') ? '✕' : '☰';
      });
    }

    const stb = document.getElementById('scrollTop');
    window.addEventListener('scroll', () => stb.classList.toggle('visible', window.scrollY > 300));

    Auth.requireRole('admin', 'admin_login.html');
    const allPatients = DB.getPatients(), allAppts = DB.getAppointments();

    function animCount(el, target) {
      let c = 0; const step = Math.max(1, Math.ceil(target / 20));
      const iv = setInterval(() => { c = Math.min(c + step, target); el.textContent = c; if (c >= target) clearInterval(iv); }, 50);
    }

    const thisMonth = allPatients.filter(p => {
      if (!p.dob) return false;
      const d = new Date(p.dob); return d.getMonth() === new Date().getMonth() && d.getFullYear() === new Date().getFullYear();
    }).length;
    const withAppts = allPatients.filter(p => allAppts.some(a => a.patientId === p.id)).length;

    setTimeout(() => {
      animCount(document.getElementById('totalCount'), allPatients.length);
      animCount(document.getElementById('newCount'), thisMonth);
      animCount(document.getElementById('withAppts'), withAppts);
    }, 1200);

    function renderTable() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      const patients = allPatients.filter(p => !q || p.name.toLowerCase().includes(q) || p.email.toLowerCase().includes(q));
      const tbody = document.getElementById('patientTable');
      document.getElementById('tableFooter').textContent = `Showing ${patients.length} of ${allPatients.length} patients`;

      if (!patients.length) {
        tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted" style="padding:32px;">No patients found.</td></tr>';
        return;
      }
      tbody.innerHTML = patients.map((p, i) => {
        const count = allAppts.filter(a => a.patientId === p.id).length;
        const initials = p.name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
        return `<tr style="animation:slideIn .35s ${i * .04}s ease both;">
        <td class="text-muted" style="font-size:.8rem;">${i + 1}</td>
        <td>
          <div style="display:flex;align-items:center;gap:10px;">
            <div class="patient-avatar">${initials}</div>
            <div>
              <div style="font-weight:700;">${p.name}</div>
              <div style="font-size:.72rem;font-family:var(--mono);color:var(--text-soft);">${p.id}</div>
            </div>
          </div>
        </td>
        <td>${p.email}</td>
        <td>${p.phone}</td>
        <td>${p.gender}</td>
        <td>${formatDate(p.dob)}</td>
        <td><span class="badge ${count > 0 ? 'badge-blue' : 'badge-gray'}">${count} appt${count !== 1 ? 's' : ''}</span></td>
      </tr>`;
      }).join('');
    }

    renderTable();
  </script>
</body>

</html>
