<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book Appointment – QLINIC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      overflow-x: hidden;
    }

    .cursor {
      width: 12px;
      height: 12px;
      background: var(--primary);
      border-radius: 50%;
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: transform .15s ease, background .2s ease;
    }

    .mesh-bg {
      position: fixed;
      inset: 0;
      z-index: -1;
      overflow: hidden;
    }

    .mesh-bg::before {
      content: '';
      position: absolute;
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(14, 164, 113, .08) 0%, transparent 65%);
      border-radius: 50%;
      top: -180px;
      right: -180px;
      animation: meshDrift1 12s ease-in-out infinite alternate;
    }

    .mesh-bg::after {
      content: '';
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(99, 102, 241, .05) 0%, transparent 65%);
      border-radius: 50%;
      bottom: -120px;
      left: -120px;
      animation: meshDrift2 10s ease-in-out infinite alternate;
    }

    @keyframes meshDrift1 {
      0% {
        transform: translate(0, 0) scale(1)
      }

      100% {
        transform: translate(-50px, 70px) scale(1.12)
      }
    }

    @keyframes meshDrift2 {
      0% {
        transform: translate(0, 0) scale(1)
      }

      100% {
        transform: translate(70px, -50px) scale(1.15)
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(22px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0
      }

      to {
        opacity: 1
      }
    }

    @keyframes loaderGrow {
      from {
        width: 0
      }

      to {
        width: 100%
      }
    }

    @keyframes bounce {

      0%,
      100% {
        transform: translateY(0)
      }

      50% {
        transform: translateY(-5px)
      }
    }

    @keyframes slotPop {
      from {
        opacity: 0;
        transform: scale(.85)
      }

      to {
        opacity: 1;
        transform: scale(1)
      }
    }

    .page-loader {
      position: fixed;
      inset: 0;
      background: #fff;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 18px;
      transition: opacity .5s ease, visibility .5s ease;
    }

    .page-loader.gone {
      opacity: 0;
      visibility: hidden;
    }

    .loader-brand {
      font-family: 'Syne', sans-serif;
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--primary);
    }

    .loader-bar {
      width: 180px;
      height: 3px;
      background: var(--primary-lt, #d1fae5);
      border-radius: 3px;
      overflow: hidden;
    }

    .loader-fill {
      height: 100%;
      background: var(--primary);
      border-radius: 3px;
      animation: loaderGrow 1.1s ease forwards;
    }

    .topbar {
      backdrop-filter: blur(20px) !important;
      background: rgba(255, 255, 255, .88) !important;
      animation: fadeIn .4s ease;
    }

    .topbar-brand {
      font-family: 'Syne', sans-serif !important;
      font-weight: 800 !important;
    }

    .topbar-brand .q {
      display: inline-block;
      animation: bounce 2.5s ease-in-out infinite;
      color: var(--primary);
    }

    .topbar-nav a {
      border-radius: 8px;
      transition: color .2s ease, background .2s ease !important;
    }

    .topbar-nav a:hover {
      color: var(--primary) !important;
      background: var(--primary-lt) !important;
    }

    .card {
      animation: fadeUp .5s ease both;
      transition: box-shadow .25s ease !important;
    }

    .card:hover {
      box-shadow: 0 10px 36px rgba(0, 0, 0, .1) !important;
    }

    .btn {
      transition: all .2s ease !important;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, .18), transparent);
      transform: translateX(-100%);
      transition: transform .4s ease;
    }

    .btn:hover::before {
      transform: translateX(100%);
    }

    .btn-primary:hover {
      transform: translateY(-2px) !important;
      box-shadow: 0 6px 18px var(--primary-glow) !important;
    }

    .form-control:focus {
      border-color: var(--primary) !important;
      box-shadow: 0 0 0 3px rgba(14, 164, 113, .12) !important;
      outline: none !important;
    }

    .page-header h1 {
      font-family: 'Syne', sans-serif !important;
      font-weight: 800 !important;
      animation: fadeUp .5s ease both;
    }

    .book-layout {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 24px;
      align-items: start;
    }

    @media(max-width:768px) {
      .book-layout {
        grid-template-columns: 1fr;
      }

      .book-sidebar {
        display: none;
      }
    }

    .book-sidebar img {
      width: 100%;
      border-radius: var(--radius-lg);
      height: 220px;
      object-fit: cover;
      transition: transform .5s ease;
      box-shadow: 0 12px 32px rgba(0, 0, 0, .12);
    }

    .book-sidebar img:hover {
      transform: scale(1.03);
    }

    .info-block {
      background: var(--primary-lt);
      border-radius: var(--radius);
      padding: 18px;
      margin-top: 16px;
      border: 1px solid rgba(14, 164, 113, .15);
      animation: fadeUp .5s .2s ease both;
    }

    .info-block p {
      font-size: .8125rem;
      color: var(--primary-dk);
      line-height: 1.7;
    }

    .time-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .time-slot {
      padding: 9px 6px;
      text-align: center;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      font-size: .8125rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s ease;
      background: var(--surface);
      color: var(--text-muted);
      animation: slotPop .3s ease both;
    }

    .time-slot:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: var(--primary-lt);
      transform: translateY(-2px);
    }

    .time-slot.selected {
      border-color: var(--primary);
      background: var(--primary);
      color: #fff;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px var(--primary-glow);
    }
  </style>
</head>

<body>
  <div class="cursor" id="cursor"></div>
  <div class="mesh-bg"></div>
  <div class="page-loader" id="loader">
    <div class="loader-brand">Q<span style="color:var(--accent,#f59e0b)">.</span>LINIC</div>
    <div class="loader-bar">
      <div class="loader-fill"></div>
    </div>
  </div>

  <header class="topbar">
    <div class="topbar-brand"><span class="q">Q</span><span class="dot">.</span>LINIC
      <span
        style="font-size:.72rem;font-weight:500;color:var(--text-soft);margin-left:8px;background:var(--surface-2);padding:2px 8px;border-radius:4px;">Patient</span>
    </div>
    <nav class="topbar-nav">
      <a href="patient_dashboard.html">Dashboard</a>
      <a href="patient_view_doctors.html">Doctors</a>
      <a href="patient_book_appointment.html" class="active">Book</a>
      <a href="patient_my_appointments.html">Appointments</a>
      <a href="patient_profile.html">Profile</a>
      <a href="#" onclick="Auth.logout()" class="btn btn-outline btn-sm" style="margin-left:8px;">Logout</a>
    </nav>
  </header>

  <div class="page-wrap">
    <div class="page-header">
      <div>
        <h1>Book an Appointment</h1>
        <p>Select a doctor, date and time slot</p>
      </div>
    </div>
    <div class="book-layout">
      <div class="card">
        <div id="alert-box"></div>
        <form id="bookForm" novalidate>
          <div class="form-group">
            <label>Select Doctor</label>
            <select id="doctor" class="form-control" required>
              <option value="">— Choose a doctor —</option>
            </select>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
            <div class="form-group">
              <label>Preferred Date</label>
              <input type="date" id="date" class="form-control" required />
            </div>
            <div class="form-group" style="display:flex;flex-direction:column;">
              <label>Selected Time</label>
              <input type="text" id="timeDisplay" class="form-control" placeholder="Click a slot below" readonly
                style="cursor:pointer;" required />
              <input type="hidden" id="time" />
            </div>
          </div>
          <div class="form-group">
            <label>Available Time Slots</label>
            <div class="time-grid" id="timeGrid"></div>
          </div>
          <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top:8px;">Confirm Booking
            →</button>
        </form>
      </div>
      <div class="book-sidebar">
        <img src="https://images.unsplash.com/photo-1579684385127-1ef15d508118?w=600&q=80" alt="Booking" />
        <div class="info-block">
          <p>📋 <strong>Booking tips:</strong><br />• Arrive 10 min before your slot<br />• Bring any previous
            prescriptions<br />• Your token will be confirmed via this portal</p>
        </div>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    window.addEventListener('load', () => setTimeout(() => document.getElementById('loader').classList.add('gone'), 1100));
    const cur = document.getElementById('cursor');
    document.addEventListener('mousemove', e => { cur.style.left = e.clientX + 'px'; cur.style.top = e.clientY + 'px'; });
    document.querySelectorAll('a,button').forEach(el => {
      el.addEventListener('mouseenter', () => { cur.style.transform = 'translate(-50%,-50%) scale(2)'; cur.style.background = 'var(--accent,#f59e0b)'; });
      el.addEventListener('mouseleave', () => { cur.style.transform = 'translate(-50%,-50%) scale(1)'; cur.style.background = 'var(--primary)'; });
    });

    const session = Auth.requireRole('patient', 'patient_login.html');
    const params = new URLSearchParams(location.search);
    const preDoc = params.get('doctorId');
    const docSel = document.getElementById('doctor');
    DB.getDoctors().filter(d => d.available).forEach(d => {
      const opt = document.createElement('option');
      opt.value = d.id; opt.textContent = `${d.name} — ${d.speciality}`;
      if (preDoc && d.id === preDoc) opt.selected = true;
      docSel.appendChild(opt);
    });
    document.getElementById('date').min = new Date().toISOString().split('T')[0];

    const slots = ['09:00', '09:30', '10:00', '10:30', '11:00', '11:30', '14:00', '14:30', '15:00', '15:30', '16:00', '16:30'];
    const grid = document.getElementById('timeGrid');
    grid.innerHTML = slots.map((s, i) => `<div class="time-slot" style="animation-delay:${i * .04}s" onclick="selectSlot('${s}',this)">${s}</div>`).join('');

    function selectSlot(t, el) {
      document.querySelectorAll('.time-slot').forEach(x => x.classList.remove('selected'));
      el.classList.add('selected');
      document.getElementById('time').value = t;
      document.getElementById('timeDisplay').value = t;
    }

    document.getElementById('bookForm').addEventListener('submit', function (e) {
      e.preventDefault();
      const doctorId = docSel.value;
      const date = document.getElementById('date').value;
      const time = document.getElementById('time').value;
      if (!doctorId || !date || !time) return showAlert('alert-box', 'Please fill in all fields and select a time slot.');
      const appointments = DB.getAppointments();
      const dup = appointments.find(a => a.patientId === session.id && a.doctorId === doctorId && a.date === date && a.status !== 'Cancelled');
      if (dup) return showAlert('alert-box', 'You already have an appointment with this doctor on that date.');
      const token = DB.nextToken();
      const appt = { id: DB.nextId('A', appointments), patientId: session.id, doctorId, date, time, status: 'Pending', token, prescription: '' };
      appointments.push(appt);
      DB.saveAppointments(appointments);
      sessionStorage.setItem('ql_last_appt', JSON.stringify(appt));
      location.href = 'patient_token.html';
    });
  </script>
</body>

</html>
