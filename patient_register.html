<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register – QLINIC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      overflow-x: hidden;
    }


    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(22px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0
      }

      to {
        opacity: 1
      }
    }

    @keyframes loaderGrow {
      from {
        width: 0
      }

      to {
        width: 100%
      }
    }

    @keyframes shimmer {
      0% {
        background-position: 200% center
      }

      100% {
        background-position: -200% center
      }
    }

    @keyframes imgZoom {
      from {
        transform: scale(1.05)
      }

      to {
        transform: scale(1)
      }
    }

    .page-loader {
      position: fixed;
      inset: 0;
      background: #fff;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 18px;
      transition: opacity .5s ease, visibility .5s ease;
    }

    .page-loader.gone {
      opacity: 0;
      visibility: hidden;
    }

    .loader-brand {
      font-family: 'Syne', sans-serif;
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--primary);
    }

    .loader-bar {
      width: 180px;
      height: 3px;
      background: var(--primary-lt, #d1fae5);
      border-radius: 3px;
      overflow: hidden;
    }

    .loader-fill {
      height: 100%;
      background: var(--primary);
      border-radius: 3px;
      animation: loaderGrow 1.1s ease forwards;
    }

    /* Auth page upgrades */
    .auth-page .auth-visual img {
      animation: imgZoom 1.5s ease both;
    }

    .auth-logo {
      font-family: 'Syne', sans-serif !important;
      font-weight: 800 !important;
    }

    .auth-visual-brand {
      font-family: 'Syne', sans-serif !important;
      font-weight: 800 !important;
    }

    .auth-card {
      animation: fadeUp .5s .1s ease both;
    }

    .auth-tagline {
      animation: fadeUp .5s .15s ease both;
    }

    .btn {
      transition: all .2s ease !important;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, .18), transparent);
      transform: translateX(-100%);
      transition: transform .4s ease;
    }

    .btn:hover::before {
      transform: translateX(100%);
    }

    .btn-primary {
      transition: all .2s ease !important;
    }

    .btn-primary:hover {
      transform: translateY(-2px) !important;
      box-shadow: 0 8px 24px var(--primary-glow) !important;
    }

    .form-control {
      transition: border-color .2s ease, box-shadow .2s ease !important;
    }

    .form-control:focus {
      border-color: var(--primary) !important;
      box-shadow: 0 0 0 3px rgba(14, 164, 113, .12) !important;
      outline: none !important;
    }

    .form-group {
      animation: fadeUp .4s ease both;
    }

    .form-group:nth-child(1) {
      animation-delay: .1s
    }

    .form-group:nth-child(2) {
      animation-delay: .15s
    }

    .form-group:nth-child(3) {
      animation-delay: .2s
    }

    .form-group:nth-child(4) {
      animation-delay: .25s
    }

    .form-group:nth-child(5) {
      animation-delay: .3s
    }

    /* Shimmer on logo */
    .auth-logo span.dot,
    .auth-visual-brand span.dot {
      color: var(--accent, #f59e0b);
    }

    /* Input wrap icon pop on focus */
    .input-wrap:focus-within .input-ico {
      transform: scale(1.2);
    }

    .input-ico {
      transition: transform .2s ease;
    }

    @media (max-width: 900px) {
      .auth-page {
        display: block;
        overflow: visible;
      }

      .auth-visual {
        display: none;
      }

      .auth-form-side {
        min-height: 100vh;
        padding: 24px 20px;
        overflow: visible;
      }

      .auth-card {
        padding: 0;
        max-width: 100%;
      }

      .form-grid-2 {
        grid-template-columns: 1fr !important;
      }
    }
  </style>
</head>

<body class="auth-page">
  <div class="page-loader" id="loader">
    <div class="loader-brand">Q<span style="color:var(--accent,#f59e0b)">.</span>LINIC</div>
    <div class="loader-bar">
      <div class="loader-fill"></div>
    </div>
  </div>

  <div class="auth-visual">
    <img src="https://images.unsplash.com/photo-1586773860418-d37222d8fce3?w=900&q=80" alt="Registration" />
    <div class="auth-visual-overlay">
      <div class="auth-visual-brand">Q<span class="dot">.</span>LINIC</div>
      <div class="auth-visual-quote">"Join thousands of patients managing their health the smart way."</div>
      <div class="auth-visual-sub">Free patient account · Takes 2 minutes</div>
    </div>
  </div>

  <div class="auth-form-side">
    <div class="auth-card">
      <div class="auth-logo">Q<span class="dot">.</span>LINIC</div>
      <div class="auth-tagline">Create your patient account</div>
      <div id="alert-box"></div>
      <form id="regForm" novalidate>
        <div class="form-group">
          <label>Full Name</label>
          <div class="input-wrap"><span class="input-ico">👤</span><input type="text" id="name" class="form-control"
              placeholder="e.g. Arjun Menon" required /></div>
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <div class="input-wrap"><span class="input-ico">📧</span><input type="email" id="email" class="form-control"
              placeholder="you@email.com" required /></div>
        </div>
        <div class="form-grid-2" style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
          <div class="form-group"><label>Phone</label><input type="tel" id="phone" class="form-control"
              placeholder="10-digit" required /></div>
          <div class="form-group"><label>Date of Birth</label><input type="date" id="dob" class="form-control"
              required /></div>
        </div>
        <div class="form-group">
          <label>Gender</label>
          <select id="gender" class="form-control" required>
            <option value="">Select gender</option>
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
          </select>
        </div>
        <div class="form-grid-2" style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
          <div class="form-group"><label>Password</label><input type="password" id="password" class="form-control"
              placeholder="Min 6 chars" required /></div>
          <div class="form-group"><label>Confirm Password</label><input type="password" id="confirm"
              class="form-control" placeholder="Re-enter" required /></div>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg">Create Account →</button>
      </form>
      <div class="auth-footer">
        Already have an account? <a href="patient_login.html"><strong>Login</strong></a><br />
        <a href="index.html" style="color:var(--text-soft);">← Back to Home</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/app.js"></script>
  <script>
    window.addEventListener('load', () => setTimeout(() => document.getElementById('loader').classList.add('gone'), 1100));

    document.getElementById('regForm').addEventListener('submit', function (e) {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim().toLowerCase();
      const phone = document.getElementById('phone').value.trim();
      const dob = document.getElementById('dob').value;
      const gender = document.getElementById('gender').value;
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;
      if (!name || !email || !phone || !dob || !gender || !password) return showAlert('alert-box', 'Please fill in all fields.');
      if (password.length < 6) return showAlert('alert-box', 'Password must be at least 6 characters.');
      if (password !== confirm) return showAlert('alert-box', 'Passwords do not match.');
      const patients = DB.getPatients();
      if (patients.find(p => p.email === email)) return showAlert('alert-box', 'An account with this email already exists.');
      patients.push({ id: DB.nextId('P', patients), name, email, phone, dob, gender, password });
      DB.savePatients(patients);
      showAlert('alert-box', 'Account created! Redirecting to login…', 'success');
      setTimeout(() => location.href = 'patient_login.html', 1800);
    });
  </script>
</body>

</html>
