<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prescription – QLINIC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
  <style>
    @media print {

      .topbar,
      .no-print {
        display: none !important;
      }

      body {
        background: #fff;
      }

      .rx-card {
        box-shadow: none !important;
        border: 1px solid #ccc !important;
        max-width: none !important;
      }
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      overflow-x: hidden;
    }


    .mesh-bg {
      position: fixed;
      inset: 0;
      z-index: -1;
      overflow: hidden;
    }

    .mesh-bg::before {
      content: '';
      position: absolute;
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(14, 164, 113, .07) 0%, transparent 65%);
      border-radius: 50%;
      top: -180px;
      right: -180px;
      animation: meshDrift1 12s ease-in-out infinite alternate;
    }

    @keyframes meshDrift1 {
      0% {
        transform: translate(0, 0) scale(1)
      }

      100% {
        transform: translate(-50px, 70px) scale(1.1)
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0
      }

      to {
        opacity: 1
      }
    }

    @keyframes scaleIn {
      from {
        opacity: 0;
        transform: scale(.94)
      }

      to {
        opacity: 1;
        transform: scale(1)
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(18px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes loaderGrow {
      from {
        width: 0
      }

      to {
        width: 100%
      }
    }

    @keyframes bounce {

      0%,
      100% {
        transform: translateY(0)
      }

      50% {
        transform: translateY(-5px)
      }
    }

    .page-loader {
      position: fixed;
      inset: 0;
      background: #fff;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 18px;
      transition: opacity .5s ease, visibility .5s ease;
    }

    .page-loader.gone {
      opacity: 0;
      visibility: hidden;
    }

    .loader-brand {
      font-family: 'Syne', sans-serif;
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--primary);
    }

    .loader-bar {
      width: 180px;
      height: 3px;
      background: var(--primary-lt, #d1fae5);
      border-radius: 3px;
      overflow: hidden;
    }

    .loader-fill {
      height: 100%;
      background: var(--primary);
      border-radius: 3px;
      animation: loaderGrow 1.1s ease forwards;
    }

    .topbar {
      backdrop-filter: blur(20px) !important;
      background: rgba(255, 255, 255, .88) !important;
      animation: fadeIn .4s ease;
    }

    .topbar-brand {
      font-family: 'Syne', sans-serif !important;
      font-weight: 800 !important;
    }

    .topbar-brand .q {
      display: inline-block;
      animation: bounce 2.5s ease-in-out infinite;
      color: var(--primary);
    }

    .topbar-nav a {
      border-radius: 8px;
      transition: color .2s ease, background .2s ease !important;
    }

    .topbar-nav a:hover {
      color: var(--primary) !important;
      background: var(--primary-lt) !important;
    }

    .btn {
      transition: all .2s ease !important;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, .18), transparent);
      transform: translateX(-100%);
      transition: transform .4s ease;
    }

    .btn:hover::before {
      transform: translateX(100%);
    }

    .btn-primary:hover {
      transform: translateY(-2px) !important;
      box-shadow: 0 6px 18px var(--primary-glow) !important;
    }

    .rx-wrap {
      max-width: 700px;
      margin: 0 auto;
    }

    .rx-card {
      background: var(--surface);
      border-radius: var(--radius-xl);
      box-shadow: 0 20px 60px rgba(0, 0, 0, .12);
      border: 1px solid var(--border);
      overflow: hidden;
      animation: scaleIn .4s ease both;
    }

    .rx-head {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dk) 100%);
      padding: 28px 36px;
      position: relative;
      overflow: hidden;
    }

    .rx-head::after {
      content: '℞';
      position: absolute;
      right: 28px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 5rem;
      font-weight: 900;
      color: rgba(255, 255, 255, .12);
      line-height: 1;
    }

    .rx-brand {
      font-family: 'Syne', sans-serif;
      font-size: 1.8rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: -1px;
    }

    .rx-brand .dot {
      color: var(--accent);
    }

    .rx-head-sub {
      color: rgba(255, 255, 255, .7);
      font-size: .85rem;
      margin-top: 4px;
    }

    .rx-body {
      padding: 32px 36px;
    }

    .rx-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 24px;
    }

    @media(max-width:500px) {
      .rx-row {
        grid-template-columns: 1fr 1fr;
      }
    }

    .rx-field label {
      font-size: .72rem;
      font-weight: 700;
      color: var(--text-soft);
      text-transform: uppercase;
      letter-spacing: .07em;
      display: block;
      margin-bottom: 4px;
    }

    .rx-field p {
      font-size: .95rem;
      font-weight: 600;
      color: var(--text);
    }

    .rx-divider {
      border: none;
      border-top: 2px dashed var(--border);
      margin: 20px 0;
    }

    .rx-prescription-box {
      background: var(--surface-2);
      border-radius: var(--radius);
      padding: 22px;
      font-size: .95rem;
      line-height: 1.85;
      white-space: pre-wrap;
      min-height: 130px;
      border: 1px solid var(--border);
      color: var(--text);
    }

    .rx-footer {
      display: flex;
      justify-content: flex-end;
      padding-top: 28px;
      border-top: 1px solid var(--border);
      margin-top: 24px;
    }

    .rx-sign {
      text-align: right;
    }

    .rx-sign-name {
      font-size: 1.1rem;
      font-weight: 800;
      font-family: 'Syne', sans-serif;
    }

    .rx-sign-spec {
      font-size: .8125rem;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .rx-sign-line {
      width: 140px;
      height: 2px;
      background: var(--text);
      margin: 10px 0 4px auto;
      border-radius: 2px;
    }

    /* Rx field hover */
    .rx-field {
      padding: 12px;
      border-radius: 8px;
      transition: background .2s ease;
    }

    .rx-field:hover {
      background: var(--primary-lt);
    }

    @media (max-width: 600px) {
      .flex-between { flex-direction: column; align-items: stretch; gap: 12px; }
      .flex-between div:last-child { display: flex; flex-direction: column; gap: 8px; }
      .flex-between div:last-child * { width: 100%; text-align: center; }
      .topbar-brand span:last-child { display: none; }
    }
  </style>
</head>

<body>
  <div class="mesh-bg"></div>
  <div class="page-loader" id="loader">
    <div class="loader-brand">Q<span style="color:var(--accent,#f59e0b)">.</span>LINIC</div>
    <div class="loader-bar">
      <div class="loader-fill"></div>
    </div>
  </div>

  <header class="topbar no-print">
    <div class="topbar-brand"><span class="q">Q</span><span class="dot">.</span>LINIC
      <span
        style="font-size:.72rem;font-weight:500;color:var(--text-soft);margin-left:8px;background:var(--surface-2);padding:2px 8px;border-radius:4px;">Patient</span>
    </div>

    <button class="menu-toggle" id="menuToggle" style="margin-left:auto;">☰</button>

    <nav class="topbar-nav" id="topbarNav">
      <a href="patient_dashboard.html">Dashboard</a>
      <a href="patient_my_appointments.html">Appointments</a>
      <a href="#" onclick="Auth.logout()" class="btn btn-outline btn-sm" style="margin-left:8px;">Logout</a>
    </nav>
  </header>

  <div class="page-wrap rx-wrap">
    <div class="no-print flex-between" style="margin-bottom:18px;animation:fadeUp .4s ease both;">
      <div>
        <h1 style="font-size:1.4rem;font-weight:800;font-family:'Syne',sans-serif;">Prescription</h1>
      </div>
      <div style="display:flex;gap:10px;">
        <button class="btn btn-primary" onclick="window.print()">🖨️ Print / Save PDF</button>
        <a href="patient_my_appointments.html" class="btn btn-outline">← Back</a>
      </div>
    </div>
    <div class="rx-card" id="rxCard">
      <div style="padding:40px;text-align:center;color:var(--text-muted);">Loading prescription…</div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    window.addEventListener('load', () => setTimeout(() => document.getElementById('loader').classList.add('gone'), 1100));

    // Menu Toggle
    const menuToggle = document.getElementById('menuToggle');
    const topbarNav = document.getElementById('topbarNav');
    if (menuToggle && topbarNav) {
      menuToggle.addEventListener('click', () => {
        topbarNav.classList.toggle('open');
        menuToggle.textContent = topbarNav.classList.contains('open') ? '✕' : '☰';
      });
    }
    Auth.requireRole('patient', 'patient_login.html');
    const params = new URLSearchParams(location.search);
    const appt = DB.getAppointments().find(a => a.id === params.get('apptId'));
    const card = document.getElementById('rxCard');
    if (!appt || !appt.prescription) {
      card.innerHTML = '<div style="padding:48px;text-align:center;color:var(--text-muted);">No prescription found for this appointment.</div>';
    } else {
      const doc = DB.doctorById(appt.doctorId);
      const pat = DB.patientById(appt.patientId);
      card.innerHTML = `
      <div class="rx-head">
        <div class="rx-brand">Q<span class="dot">.</span>LINIC</div>
        <div class="rx-head-sub">QLINIC Smart Clinic Management System</div>
      </div>
      <div class="rx-body">
        <div class="rx-row">
          <div class="rx-field"><label>Patient Name</label><p>${pat ? pat.name : '—'}</p></div>
          <div class="rx-field"><label>Date</label><p>${formatDate(appt.date)}</p></div>
          <div class="rx-field"><label>Token No.</label><p style="font-family:var(--mono);color:var(--primary);">#${appt.token}</p></div>
        </div>
        <div class="rx-row">
          <div class="rx-field"><label>Consulting Doctor</label><p>${doc ? doc.name : '—'}</p></div>
          <div class="rx-field"><label>Speciality</label><p>${doc ? doc.speciality : '—'}</p></div>
          <div class="rx-field"><label>Phone</label><p>${doc ? doc.phone : '—'}</p></div>
        </div>
        <hr class="rx-divider"/>
        <div style="font-size:.75rem;font-weight:700;color:var(--text-soft);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;">Prescription Details</div>
        <div class="rx-prescription-box">${appt.prescription}</div>
        <div class="rx-footer">
          <div class="rx-sign">
            <div class="rx-sign-line"></div>
            <div class="rx-sign-name">${doc ? doc.name : '—'}</div>
            <div class="rx-sign-spec">${doc ? doc.speciality : ''}</div>
            <div class="rx-sign-spec">QLINIC</div>
          </div>
        </div>
      </div>`;
    }
  </script>
</body>

</html>
