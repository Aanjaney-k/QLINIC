<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doctor Dashboard – QLINIC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      overflow-x: hidden;
    }


    .mesh-bg {
      position: fixed;
      inset: 0;
      z-index: -1;
      overflow: hidden;
    }

    .mesh-bg::before {
      content: '';
      position: absolute;
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(14, 164, 113, .08) 0%, transparent 65%);
      border-radius: 50%;
      top: -180px;
      right: -180px;
      animation: meshDrift1 12s ease-in-out infinite alternate;
    }

    .mesh-bg::after {
      content: '';
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(99, 102, 241, .05) 0%, transparent 65%);
      border-radius: 50%;
      bottom: -120px;
      left: -120px;
      animation: meshDrift2 10s ease-in-out infinite alternate;
    }

    @keyframes meshDrift1 {
      0% {
        transform: translate(0, 0) scale(1)
      }

      100% {
        transform: translate(-50px, 70px) scale(1.12)
      }
    }

    @keyframes meshDrift2 {
      0% {
        transform: translate(0, 0) scale(1)
      }

      100% {
        transform: translate(70px, -50px) scale(1.15)
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(22px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0
      }

      to {
        opacity: 1
      }
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(-12px)
      }

      to {
        opacity: 1;
        transform: translateX(0)
      }
    }

    @keyframes loaderGrow {
      from {
        width: 0
      }

      to {
        width: 100%
      }
    }

    @keyframes bounce {

      0%,
      100% {
        transform: translateY(0)
      }

      50% {
        transform: translateY(-5px)
      }
    }

    @keyframes numberPop {
      0% {
        transform: scale(.8);
        opacity: 0
      }

      60% {
        transform: scale(1.1)
      }

      100% {
        transform: scale(1);
        opacity: 1
      }
    }

    @keyframes shimmer {
      0% {
        background-position: 200% center
      }

      100% {
        background-position: -200% center
      }
    }

    .page-loader {
      position: fixed;
      inset: 0;
      background: #fff;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 18px;
      transition: opacity .5s ease, visibility .5s ease;
    }

    .page-loader.gone {
      opacity: 0;
      visibility: hidden;
    }

    .loader-brand {
      font-family: 'Syne', sans-serif;
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--primary);
    }

    .loader-bar {
      width: 180px;
      height: 3px;
      background: var(--primary-lt, #d1fae5);
      border-radius: 3px;
      overflow: hidden;
    }

    .loader-fill {
      height: 100%;
      background: var(--primary);
      border-radius: 3px;
      animation: loaderGrow 1.1s ease forwards;
    }

    .scroll-top {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 44px;
      height: 44px;
      background: var(--primary);
      color: #fff;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-size: 1.2rem;
      box-shadow: 0 4px 16px var(--primary-glow);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: translateY(14px);
      transition: all .2s ease;
      z-index: 200;
    }

    .scroll-top.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .scroll-top:hover {
      background: var(--primary-dk);
      transform: translateY(-2px);
    }

    .topbar {
      backdrop-filter: blur(20px) !important;
      background: rgba(255, 255, 255, .88) !important;
      animation: fadeIn .4s ease;
    }

    .topbar-brand {
      font-family: 'Syne', sans-serif !important;
      font-weight: 800 !important;
    }

    .topbar-brand .q {
      display: inline-block;
      animation: bounce 2.5s ease-in-out infinite;
      color: var(--primary);
    }

    .topbar-nav a {
      border-radius: 8px;
      transition: color .2s ease, background .2s ease !important;
    }

    .topbar-nav a:hover {
      color: var(--primary) !important;
      background: var(--primary-lt) !important;
    }

    .stat-card {
      transition: transform .25s ease, box-shadow .25s ease !important;
      animation: fadeUp .5s ease both;
    }

    .stat-card:hover {
      transform: translateY(-6px) !important;
      box-shadow: 0 16px 36px rgba(0, 0, 0, .1) !important;
    }

    .stat-card.d1 {
      animation-delay: .05s
    }

    .stat-card.d2 {
      animation-delay: .12s
    }

    .stat-card.d3 {
      animation-delay: .19s
    }

    .stat-card.d4 {
      animation-delay: .26s
    }

    .stat-val {
      animation: numberPop .6s .3s ease both;
    }

    .card {
      animation: fadeUp .5s ease both;
      transition: box-shadow .25s ease !important;
    }

    .card:hover {
      box-shadow: 0 10px 36px rgba(0, 0, 0, .1) !important;
    }

    tbody tr {
      transition: background .15s ease !important;
    }

    tbody tr:hover {
      background: var(--primary-lt) !important;
    }

    .btn {
      transition: all .2s ease !important;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, .18), transparent);
      transform: translateX(-100%);
      transition: transform .4s ease;
    }

    .btn:hover::before {
      transform: translateX(100%);
    }

    .btn-primary:hover {
      transform: translateY(-2px) !important;
      box-shadow: 0 6px 18px var(--primary-glow) !important;
    }

    .form-control:focus {
      border-color: var(--primary) !important;
      box-shadow: 0 0 0 3px rgba(14, 164, 113, .12) !important;
      outline: none !important;
    }

    .page-header h1 {
      font-family: 'Syne', sans-serif !important;
      font-weight: 800 !important;
      animation: fadeUp .5s ease both;
    }

    .quick-btn {
      transition: all .2s ease !important;
    }

    .quick-btn:hover {
      transform: translateY(-2px) !important;
      box-shadow: 0 6px 16px rgba(0, 0, 0, .1) !important;
    }

    /* Banner */
    .dash-banner {
      position: relative;
      border-radius: var(--radius-xl);
      overflow: hidden;
      margin-bottom: 24px;
      height: 180px;
      animation: fadeUp .5s ease both;
      box-shadow: 0 12px 40px rgba(0, 0, 0, .15);
    }

    .dash-banner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform .6s ease;
    }

    .dash-banner:hover img {
      transform: scale(1.04);
    }

    .dash-banner-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(100deg, rgba(7, 130, 90, .9) 0%, rgba(7, 130, 90, .4) 60%, transparent 100%);
      display: flex;
      align-items: center;
      padding: 0 32px;
    }

    .dash-banner-text h2 {
      font-family: 'Syne', sans-serif;
      font-size: 1.7rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: -.5px;
    }

    .dash-banner-text p {
      color: rgba(255, 255, 255, .8);
      font-size: .9rem;
      margin-top: 4px;
    }

    @media (max-width: 768px) {
      .dash-banner { height: auto; min-height: 160px; }
      .dash-banner-overlay { padding: 24px; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .topbar-brand span:last-child { display: none; }
    }
    @media (max-width: 480px) {
      .stats-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>
  <div class="mesh-bg"></div>
  <div class="page-loader" id="loader">
    <div class="loader-brand">Q<span style="color:var(--accent,#f59e0b)">.</span>LINIC</div>
    <div class="loader-bar">
      <div class="loader-fill"></div>
    </div>
  </div>
  <button class="scroll-top" id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

  <header class="topbar">
    <div class="topbar-brand"><span class="q">Q</span><span class="dot">.</span>LINIC
      <span
        style="font-size:.72rem;font-weight:500;color:var(--text-soft);margin-left:8px;background:var(--surface-2);padding:2px 8px;border-radius:4px;">Doctor</span>
    </div>

    <button class="menu-toggle" id="menuToggle" style="margin-left:auto;">☰</button>

    <nav class="topbar-nav" id="topbarNav">
      <a href="doctor_dashboard.html" class="active">Dashboard</a>
      <a href="doctor_appointments.html">Appointments</a>
      <a href="doctor_token_control.html">Token Control</a>
      <a href="#" onclick="Auth.logout()" class="btn btn-outline btn-sm" style="margin-left:8px;">Logout</a>
    </nav>
  </header>

  <div class="page-wrap">
    <div class="dash-banner">
      <img src="https://images.unsplash.com/photo-1576091160550-2173dba999ef?w=1200&q=80" alt="Doctor" />
      <div class="dash-banner-overlay">
        <div class="dash-banner-text">
          <h2 id="welcomeMsg">Welcome, Doctor!</h2>
          <p>Today's appointment overview</p>
        </div>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card d1">
        <div class="stat-icon">📅</div>
        <div class="stat-val" id="statTotal">0</div>
        <div class="stat-lbl">Total Appointments</div>
      </div>
      <div class="stat-card d2">
        <div class="stat-icon" style="background:#fef9c3;">⏳</div>
        <div class="stat-val" id="statPending" style="color:var(--accent);">0</div>
        <div class="stat-lbl">Pending</div>
      </div>
      <div class="stat-card d3">
        <div class="stat-icon" style="background:#dcfce7;">✅</div>
        <div class="stat-val" id="statConfirmed" style="color:#15803d;">0</div>
        <div class="stat-lbl">Confirmed</div>
      </div>
      <div class="stat-card d4">
        <div class="stat-icon" style="background:#dbeafe;">🏁</div>
        <div class="stat-val" id="statCompleted" style="color:var(--indigo);">0</div>
        <div class="stat-lbl">Completed</div>
      </div>
    </div>


    <div class="card anim-fadeup d3">
      <div class="flex-between" style="margin-bottom:18px;">
        <div>
          <div
            style="font-size:.75rem;font-weight:700;color:var(--text-soft);text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px;">
            Recent Activity</div>
          <div style="font-size:1rem;font-weight:700;font-family:'Syne',sans-serif;">Recent Appointments</div>
        </div>
        <a href="doctor_appointments.html" class="btn btn-outline btn-sm">View All →</a>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Patient</th>
              <th>Date</th>
              <th>Time</th>
              <th>Token</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="recentTable"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    window.addEventListener('load', () => setTimeout(() => document.getElementById('loader').classList.add('gone'), 1100));
    const stb = document.getElementById('scrollTop');
    window.addEventListener('scroll', () => stb.classList.toggle('visible', window.scrollY > 300));

    // Menu Toggle
    const menuToggle = document.getElementById('menuToggle');
    const topbarNav = document.getElementById('topbarNav');
    if (menuToggle && topbarNav) {
      menuToggle.addEventListener('click', () => {
        topbarNav.classList.toggle('open');
        menuToggle.textContent = topbarNav.classList.contains('open') ? '✕' : '☰';
      });
    }

    const session = Auth.requireRole('doctor', 'doctor_login.html');
    document.getElementById('welcomeMsg').textContent = `Welcome, ${session.name}!`;
    const appts = DB.getAppointments().filter(a => a.doctorId === session.id);

    function animCount(el, target) { let c = 0; const step = Math.max(1, Math.ceil(target / 20)); const iv = setInterval(() => { c = Math.min(c + step, target); el.textContent = c; if (c >= target) clearInterval(iv); }, 50); }
    setTimeout(() => {
      animCount(document.getElementById('statTotal'), appts.length);
      animCount(document.getElementById('statPending'), appts.filter(a => a.status === 'Pending').length);
      animCount(document.getElementById('statConfirmed'), appts.filter(a => a.status === 'Confirmed').length);
      animCount(document.getElementById('statCompleted'), appts.filter(a => a.status === 'Completed').length);
    }, 1200);

    const recent = appts.slice(-5).reverse();
    const tbody = document.getElementById('recentTable');
    if (recent.length) {
      tbody.innerHTML = recent.map((a, i) => {
        const p = DB.patientById(a.patientId);
        return `<tr style="animation:slideIn .35s ${i * .05}s ease both;"><td><strong>${p ? p.name : '—'}</strong></td><td>${formatDate(a.date)}</td><td>${a.time}</td><td><span style="font-family:var(--mono);font-weight:700;color:var(--primary);">#${a.token}</span></td><td>${statusBadge(a.status)}</td></tr>`;
      }).join('');
    } else {
      tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted" style="padding:28px;">No appointments yet.</td></tr>';
    }
  </script>
</body>

</html>
