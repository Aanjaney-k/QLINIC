<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Appointments – QLINIC Doctor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      overflow-x: hidden;
    }

    .cursor {
      width: 12px;
      height: 12px;
      background: var(--primary);
      border-radius: 50%;
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: transform .15s ease, background .2s ease;
    }

    .mesh-bg {
      position: fixed;
      inset: 0;
      z-index: -1;
      overflow: hidden;
    }

    .mesh-bg::before {
      content: '';
      position: absolute;
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(14, 164, 113, .08) 0%, transparent 65%);
      border-radius: 50%;
      top: -180px;
      right: -180px;
      animation: meshDrift1 12s ease-in-out infinite alternate;
    }

    .mesh-bg::after {
      content: '';
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(99, 102, 241, .05) 0%, transparent 65%);
      border-radius: 50%;
      bottom: -120px;
      left: -120px;
      animation: meshDrift2 10s ease-in-out infinite alternate;
    }

    @keyframes meshDrift1 {
      0% {
        transform: translate(0, 0) scale(1)
      }

      100% {
        transform: translate(-50px, 70px) scale(1.12)
      }
    }

    @keyframes meshDrift2 {
      0% {
        transform: translate(0, 0) scale(1)
      }

      100% {
        transform: translate(70px, -50px) scale(1.15)
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(22px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0
      }

      to {
        opacity: 1
      }
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(-12px)
      }

      to {
        opacity: 1;
        transform: translateX(0)
      }
    }

    @keyframes loaderGrow {
      from {
        width: 0
      }

      to {
        width: 100%
      }
    }

    @keyframes bounce {

      0%,
      100% {
        transform: translateY(0)
      }

      50% {
        transform: translateY(-5px)
      }
    }

    .page-loader {
      position: fixed;
      inset: 0;
      background: #fff;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 18px;
      transition: opacity .5s ease, visibility .5s ease;
    }

    .page-loader.gone {
      opacity: 0;
      visibility: hidden;
    }

    .loader-brand {
      font-family: 'Syne', sans-serif;
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--primary);
    }

    .loader-bar {
      width: 180px;
      height: 3px;
      background: var(--primary-lt, #d1fae5);
      border-radius: 3px;
      overflow: hidden;
    }

    .loader-fill {
      height: 100%;
      background: var(--primary);
      border-radius: 3px;
      animation: loaderGrow 1.1s ease forwards;
    }

    .scroll-top {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 44px;
      height: 44px;
      background: var(--primary);
      color: #fff;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-size: 1.2rem;
      box-shadow: 0 4px 16px var(--primary-glow);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: translateY(14px);
      transition: all .2s ease;
      z-index: 200;
    }

    .scroll-top.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .scroll-top:hover {
      background: var(--primary-dk);
      transform: translateY(-2px);
    }

    .topbar {
      backdrop-filter: blur(20px) !important;
      background: rgba(255, 255, 255, .88) !important;
      animation: fadeIn .4s ease;
    }

    .topbar-brand {
      font-family: 'Syne', sans-serif !important;
      font-weight: 800 !important;
    }

    .topbar-brand .q {
      display: inline-block;
      animation: bounce 2.5s ease-in-out infinite;
      color: var(--primary);
    }

    .topbar-nav a {
      border-radius: 8px;
      transition: color .2s ease, background .2s ease !important;
    }

    .topbar-nav a:hover {
      color: var(--primary) !important;
      background: var(--primary-lt) !important;
    }

    .card {
      animation: fadeUp .5s .1s ease both;
      transition: box-shadow .25s ease !important;
    }

    .card:hover {
      box-shadow: 0 10px 36px rgba(0, 0, 0, .1) !important;
    }

    tbody tr {
      transition: background .15s ease !important;
    }

    tbody tr:hover {
      background: var(--primary-lt) !important;
    }

    .btn {
      transition: all .2s ease !important;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, .18), transparent);
      transform: translateX(-100%);
      transition: transform .4s ease;
    }

    .btn:hover::before {
      transform: translateX(100%);
    }

    .btn-primary:hover {
      transform: translateY(-2px) !important;
      box-shadow: 0 6px 18px var(--primary-glow) !important;
    }

    .btn-outline:hover {
      transform: translateY(-1px) !important;
    }

    .form-control:focus {
      border-color: var(--primary) !important;
      box-shadow: 0 0 0 3px rgba(14, 164, 113, .12) !important;
      outline: none !important;
    }

    .page-header h1 {
      font-family: 'Syne', sans-serif !important;
      font-weight: 800 !important;
      animation: fadeUp .5s ease both;
    }

    .modal {
      animation: fadeUp .3s ease both !important;
    }

    /* Filter buttons row */
    .filter-row {
      display: flex;
      gap: 8px;
      margin-bottom: 18px;
      flex-wrap: wrap;
      animation: fadeUp .4s .1s ease both;
    }
  </style>
</head>

<body>
  <div class="cursor" id="cursor"></div>
  <div class="mesh-bg"></div>
  <div class="page-loader" id="loader">
    <div class="loader-brand">Q<span style="color:var(--accent,#f59e0b)">.</span>LINIC</div>
    <div class="loader-bar">
      <div class="loader-fill"></div>
    </div>
  </div>
  <button class="scroll-top" id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

  <header class="topbar">
    <div class="topbar-brand"><span class="q">Q</span><span class="dot">.</span>LINIC
      <span
        style="font-size:.72rem;font-weight:500;color:var(--text-soft);margin-left:8px;background:var(--surface-2);padding:2px 8px;border-radius:4px;">Doctor</span>
    </div>
    <nav class="topbar-nav">
      <a href="doctor_dashboard.html">Dashboard</a>
      <a href="doctor_appointments.html" class="active">Appointments</a>
      <a href="doctor_token_control.html">Token Control</a>
      <a href="#" onclick="Auth.logout()" class="btn btn-outline btn-sm" style="margin-left:8px;">Logout</a>
    </nav>
  </header>

  <div class="page-wrap">
    <div class="page-header">
      <div>
        <h1>My Appointments</h1>
        <p>Manage patient appointments and write prescriptions</p>
      </div>
    </div>
    <div class="filter-row">
      <button class="btn btn-primary btn-sm" onclick="filterAppts('all')" id="btn-all">All</button>
      <button class="btn btn-outline btn-sm" onclick="filterAppts('Pending')" id="btn-Pending">⏳ Pending</button>
      <button class="btn btn-outline btn-sm" onclick="filterAppts('Confirmed')" id="btn-Confirmed">✅ Confirmed</button>
      <button class="btn btn-outline btn-sm" onclick="filterAppts('Completed')" id="btn-Completed">🏁 Completed</button>
    </div>
    <div class="card anim-fadeup">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Patient</th>
              <th>Date</th>
              <th>Time</th>
              <th>Token</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="apptTable"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Prescription Modal -->
  <div class="modal-overlay" id="prxModal">
    <div class="modal">
      <div class="modal-header">
        <h3 style="font-family:'Syne',sans-serif;">Write Prescription</h3>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div
        style="background:var(--surface-2);border-radius:var(--radius);padding:12px 16px;margin-bottom:18px;font-size:.875rem;">
        Patient: <strong id="prxPatientName">—</strong> &nbsp;·&nbsp; Token: <strong id="prxToken">—</strong>
      </div>
      <div id="modal-alert"></div>
      <div class="form-group">
        <label>Prescription Notes</label>
        <textarea id="prxText" class="form-control" rows="7"
          placeholder="Medications, dosage, instructions, follow-up advice…"></textarea>
      </div>
      <div style="display:flex;gap:10px;justify-content:flex-end;">
        <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="savePrescription()">💾 Save Prescription</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    window.addEventListener('load', () => setTimeout(() => document.getElementById('loader').classList.add('gone'), 1100));
    const cur = document.getElementById('cursor');
    document.addEventListener('mousemove', e => { cur.style.left = e.clientX + 'px'; cur.style.top = e.clientY + 'px'; });
    document.querySelectorAll('a,button').forEach(el => {
      el.addEventListener('mouseenter', () => { cur.style.transform = 'translate(-50%,-50%) scale(2)'; cur.style.background = 'var(--accent,#f59e0b)'; });
      el.addEventListener('mouseleave', () => { cur.style.transform = 'translate(-50%,-50%) scale(1)'; cur.style.background = 'var(--primary)'; });
    });
    window.addEventListener('scroll', () => document.getElementById('scrollTop').classList.toggle('visible', window.scrollY > 300));

    const session = Auth.requireRole('doctor', 'doctor_login.html');
    let currentFilter = 'all', currentApptId = null;

    function renderTable() {
      let appts = DB.getAppointments().filter(a => a.doctorId === session.id);
      if (currentFilter !== 'all') appts = appts.filter(a => a.status === currentFilter);
      appts = appts.reverse();
      const tbody = document.getElementById('apptTable');
      if (!appts.length) { tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted" style="padding:32px;">No appointments found.</td></tr>'; return; }
      tbody.innerHTML = appts.map((a, i) => {
        const p = DB.patientById(a.patientId);
        const hasPrx = !!a.prescription;
        const canWrite = a.status === 'Confirmed' || a.status === 'Completed';
        const actions = `
        ${a.status === 'Pending' ? `<button class="btn btn-outline btn-sm" onclick="updateStatus('${a.id}','Confirmed')">✓ Confirm</button>` : ''}
        ${a.status === 'Confirmed' ? `<button class="btn btn-outline btn-sm" onclick="updateStatus('${a.id}','Completed')">✔ Complete</button>` : ''}
        ${canWrite ? `<button class="btn btn-primary btn-sm" onclick="openPrescription('${a.id}','${p ? p.name.replace(/'/g, '') : ''}','${a.token}')">${hasPrx ? '✏️ Edit Rx' : '+ Prescription'}</button>` : ''}
      `;
        return `<tr style="animation:slideIn .35s ${i * .04}s ease both;">
        <td class="text-muted" style="font-size:.8rem;">${i + 1}</td>
        <td><div style="font-weight:700;">${p ? p.name : '—'}</div><div class="text-muted" style="font-size:.75rem;">${p ? p.phone : ''}</div></td>
        <td>${formatDate(a.date)}</td><td>${a.time}</td>
        <td><span style="font-family:var(--mono);font-weight:700;color:var(--primary);">#${a.token}</span></td>
        <td>${statusBadge(a.status)}</td>
        <td><div style="display:flex;gap:6px;flex-wrap:wrap;">${actions}</div></td>
      </tr>`;
      }).join('');
    }

    function filterAppts(f) {
      currentFilter = f;
      document.querySelectorAll('[id^="btn-"]').forEach(b => { b.classList.toggle('btn-primary', b.id === `btn-${f}`); b.classList.toggle('btn-outline', b.id !== `btn-${f}`); });
      renderTable();
    }
    function updateStatus(id, s) { const all = DB.getAppointments(); const idx = all.findIndex(a => a.id === id); if (idx > -1) { all[idx].status = s; DB.saveAppointments(all); renderTable(); } }
    function openPrescription(id, name, token) {
      currentApptId = id;
      document.getElementById('prxPatientName').textContent = name;
      document.getElementById('prxToken').textContent = `#${token}`;
      const appt = DB.getAppointments().find(a => a.id === id);
      document.getElementById('prxText').value = appt ? appt.prescription : '';
      document.getElementById('prxModal').classList.add('open');
    }
    function closeModal() { document.getElementById('prxModal').classList.remove('open'); currentApptId = null; }
    function savePrescription() {
      const text = document.getElementById('prxText').value.trim();
      if (!text) return showAlert('modal-alert', 'Please enter prescription details.');
      const all = DB.getAppointments();
      const idx = all.findIndex(a => a.id === currentApptId);
      if (idx > -1) { all[idx].prescription = text; if (all[idx].status !== 'Completed') all[idx].status = 'Completed'; DB.saveAppointments(all); }
      closeModal(); renderTable();
    }
    renderTable();
  </script>
</body>

</html>
