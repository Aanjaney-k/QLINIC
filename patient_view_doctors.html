<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>View Doctors – QLINIC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      overflow-x: hidden;
    }


    .mesh-bg {
      position: fixed;
      inset: 0;
      z-index: -1;
      overflow: hidden;
    }

    .mesh-bg::before {
      content: '';
      position: absolute;
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(14, 164, 113, .08) 0%, transparent 65%);
      border-radius: 50%;
      top: -180px;
      right: -180px;
      animation: meshDrift1 12s ease-in-out infinite alternate;
    }

    .mesh-bg::after {
      content: '';
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(99, 102, 241, .05) 0%, transparent 65%);
      border-radius: 50%;
      bottom: -120px;
      left: -120px;
      animation: meshDrift2 10s ease-in-out infinite alternate;
    }

    @keyframes meshDrift1 {
      0% {
        transform: translate(0, 0) scale(1)
      }

      100% {
        transform: translate(-50px, 70px) scale(1.12)
      }
    }

    @keyframes meshDrift2 {
      0% {
        transform: translate(0, 0) scale(1)
      }

      100% {
        transform: translate(70px, -50px) scale(1.15)
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(22px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0
      }

      to {
        opacity: 1
      }
    }

    @keyframes loaderGrow {
      from {
        width: 0
      }

      to {
        width: 100%
      }
    }

    @keyframes bounce {

      0%,
      100% {
        transform: translateY(0)
      }

      50% {
        transform: translateY(-5px)
      }
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(20px) scale(.97)
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1)
      }
    }

    .page-loader {
      position: fixed;
      inset: 0;
      background: #fff;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 18px;
      transition: opacity .5s ease, visibility .5s ease;
    }

    .page-loader.gone {
      opacity: 0;
      visibility: hidden;
    }

    .loader-brand {
      font-family: 'Syne', sans-serif;
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--primary);
    }

    .loader-bar {
      width: 180px;
      height: 3px;
      background: var(--primary-lt, #d1fae5);
      border-radius: 3px;
      overflow: hidden;
    }

    .loader-fill {
      height: 100%;
      background: var(--primary);
      border-radius: 3px;
      animation: loaderGrow 1.1s ease forwards;
    }

    .topbar {
      backdrop-filter: blur(20px) !important;
      background: rgba(255, 255, 255, .88) !important;
      animation: fadeIn .4s ease;
    }

    .topbar-brand {
      font-family: 'Syne', sans-serif !important;
      font-weight: 800 !important;
    }

    .topbar-brand .q {
      display: inline-block;
      animation: bounce 2.5s ease-in-out infinite;
      color: var(--primary);
    }

    .topbar-nav a {
      border-radius: 8px;
      transition: color .2s ease, background .2s ease !important;
    }

    .topbar-nav a:hover {
      color: var(--primary) !important;
      background: var(--primary-lt) !important;
    }

    .btn {
      transition: all .2s ease !important;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, .18), transparent);
      transform: translateX(-100%);
      transition: transform .4s ease;
    }

    .btn:hover::before {
      transform: translateX(100%);
    }

    .btn-primary:hover {
      transform: translateY(-2px) !important;
      box-shadow: 0 6px 18px var(--primary-glow) !important;
    }

    .form-control:focus {
      border-color: var(--primary) !important;
      box-shadow: 0 0 0 3px rgba(14, 164, 113, .12) !important;
      outline: none !important;
    }

    .page-header h1 {
      font-family: 'Syne', sans-serif !important;
      font-weight: 800 !important;
      animation: fadeUp .5s ease both;
    }

    .doctor-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 20px;
    }

    .doc-card {
      background: var(--surface);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      border: 1px solid rgba(226, 232, 240, .8);
      overflow: hidden;
      transition: transform .3s ease, box-shadow .3s ease;
      animation: cardIn .5s ease both;
      position: relative;
    }

    .doc-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), #06b6d4);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform .4s ease;
    }

    .doc-card:hover {
      transform: translateY(-7px);
      box-shadow: 0 20px 48px rgba(14, 164, 113, .15);
    }

    .doc-card:hover::before {
      transform: scaleX(1);
    }

    .doc-card-header {
      height: 130px;
      position: relative;
      overflow: hidden;
    }

    .doc-card-header img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform .5s ease;
      filter: saturate(.9);
    }

    .doc-card:hover .doc-card-header img {
      transform: scale(1.1);
      filter: saturate(1.1);
    }

    .doc-card-header-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 40%, rgba(0, 0, 0, .5));
    }

    .doc-avail {
      position: absolute;
      top: 12px;
      right: 12px;
    }

    .doc-body {
      padding: 20px;
    }

    .doc-avatar-wrap {
      display: flex;
      align-items: flex-end;
      gap: 12px;
      margin-top: -32px;
      margin-bottom: 10px;
    }

    .doc-avatar {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: var(--primary-lt);
      border: 3px solid #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      box-shadow: var(--shadow);
      flex-shrink: 0;
      transition: transform .3s ease;
    }

    .doc-card:hover .doc-avatar {
      transform: scale(1.12) rotate(-5deg);
    }

    .doc-name {
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 800;
      margin-bottom: 3px;
    }

    .doc-spec {
      font-size: .8125rem;
      color: var(--text-muted);
    }

    .doc-phone {
      font-size: .8rem;
      color: var(--text-soft);
      margin-top: 4px;
    }

    .search-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 22px;
      animation: fadeUp .4s .1s ease both;
    }

    @media (max-width: 768px) {
      .page-header {
        flex-direction: column;
        align-items: stretch;
        gap: 12px;
      }

      .page-header a {
        width: 100%;
        margin-left: 0 !important;
      }

      .search-bar {
        flex-direction: column;
      }

      .topbar-brand span:last-child {
        display: none;
      }
    }
  </style>
</head>

<body>
  <div class="mesh-bg"></div>
  <div class="page-loader" id="loader">
    <div class="loader-brand">Q<span style="color:var(--accent,#f59e0b)">.</span>LINIC</div>
    <div class="loader-bar">
      <div class="loader-fill"></div>
    </div>
  </div>

  <header class="topbar">
    <div class="topbar-brand"><span class="q">Q</span><span class="dot">.</span>LINIC
      <span
        style="font-size:.72rem;font-weight:500;color:var(--text-soft);margin-left:8px;background:var(--surface-2);padding:2px 8px;border-radius:4px;">Patient</span>
    </div>

    <button class="menu-toggle" id="menuToggle" style="margin-left:auto;">☰</button>

    <nav class="topbar-nav" id="topbarNav">
      <a href="patient_dashboard.html">Dashboard</a>
      <a href="patient_token_view.html">Token View</a>
      <a href="patient_view_doctors.html" class="active">Doctors</a>
      <a href="patient_book_appointment.html">Book</a>
      <a href="patient_my_appointments.html">Appointments</a>
      <a href="patient_profile.html">Profile</a>
      <a href="#" onclick="Auth.logout()" class="btn btn-outline btn-sm" style="margin-left:8px;">Logout</a>
    </nav>
  </header>

  <div class="page-wrap">
    <div class="page-header">
      <div>
        <h1>Our Doctors</h1>
        <p>Browse our team of qualified specialists and book an appointment</p>
      </div>
      <a href="patient_book_appointment.html" class="btn btn-primary" style="margin-left:auto;">📅 Book Appointment</a>
    </div>
    <div class="search-bar">
      <div class="input-wrap" style="flex:1;">
        <span class="input-ico">🔍</span>
        <input type="text" id="searchInput" class="form-control" placeholder="Search by name or speciality…"
          oninput="renderDoctors()" />
      </div>
    </div>
    <div class="doctor-grid" id="doctorGrid">
      <p class="text-muted">Loading…</p>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    window.addEventListener('load', () => setTimeout(() => document.getElementById('loader').classList.add('gone'), 1100));

    // Menu Toggle
    const menuToggle = document.getElementById('menuToggle');
    const topbarNav = document.getElementById('topbarNav');
    if (menuToggle && topbarNav) {
      menuToggle.addEventListener('click', () => {
        topbarNav.classList.toggle('open');
        menuToggle.textContent = topbarNav.classList.contains('open') ? '✕' : '☰';
      });
    }

    Auth.requireRole('patient', 'patient_login.html');
    const docPhotos = [
      'https://images.unsplash.com/photo-1559839734-2b71ea197ec2?w=600&q=80',
      'https://images.unsplash.com/photo-1612349317150-e413f6a5b16d?w=600&q=80',
      'https://images.unsplash.com/photo-1622253692010-333f2da6031d?w=600&q=80',
      'https://images.unsplash.com/photo-1594824476967-48c8b964273f?w=600&q=80',
    ];

    async function renderDoctors() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      const allDoctors = await DB.getDoctors();
      const doctors = allDoctors.filter(d => !q || d.name.toLowerCase().includes(q) || d.speciality.toLowerCase().includes(q));
      const grid = document.getElementById('doctorGrid');
      if (!doctors.length) { grid.innerHTML = '<p class="text-muted">No doctors found.</p>'; return; }
      grid.innerHTML = doctors.map((d, i) => `
      <div class="doc-card" style="animation-delay:${i * .07}s;">
        <div class="doc-card-header">
          <img src="${docPhotos[i % docPhotos.length]}" alt="${d.name}" loading="lazy"/>
          <div class="doc-card-header-overlay"></div>
          <div class="doc-avail">${d.available ? '<span class="badge badge-green">Available</span>' : '<span class="badge badge-red">Unavailable</span>'}</div>
        </div>
        <div class="doc-body">
          <div class="doc-avatar-wrap"><div class="doc-avatar">🩺</div></div>
          <div class="doc-name">${d.name}</div>
          <div class="doc-spec">🏷️ ${d.speciality}</div>
          <div class="doc-phone">📞 ${d.phone}</div>
          <div style="margin-top:14px;">
            ${d.available
          ? `<a href="patient_book_appointment.html?doctorId=${d.id}" class="btn btn-primary w-100" style="justify-content:center;">Book Appointment</a>`
          : `<button class="btn btn-outline w-100" style="justify-content:center;opacity:.5;cursor:not-allowed;" disabled>Not Available</button>`}
          </div>
        </div>
      </div>`).join('');
    }
    renderDoctors();
  </script>
</body>

</html>
